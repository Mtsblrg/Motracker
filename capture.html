<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0d0f12" />
<title>Motracker — captures</title>
<style>
  :root {
    --bg: #0d0f12;
    --surface: #161a20;
    --surface-hover: #1c2026;
    --border: #22262c;
    --border-strong: #2a2d33;
    --text: #e8e8e8;
    --text-dim: #a8acb4;
    --text-faint: #6a6e76;
    --accent: #c4f060;
    --accent-dim: #9bb84c;
    --danger: #f0796e;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--bg); }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    color: var(--text);
    padding: 16px 16px 80px;
    max-width: 460px;
    margin: 0 auto;
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
  }

  header {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 18px; padding: 4px 4px 0;
  }
  header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.5px; color: var(--accent); }
  .header-right { display: flex; align-items: baseline; gap: 14px; }
  .header-right .nav { font-size: 13px; color: var(--text-faint); text-decoration: none; }
  .header-right .nav:hover { color: var(--accent); }

  .capture {
    background: var(--surface); border: 1px solid var(--border-strong);
    border-radius: var(--radius); padding: 12px 14px; margin-bottom: 18px;
    transition: border-color 0.15s;
  }
  .capture:focus-within { border-color: var(--accent); }
  .capture textarea {
    width: 100%; border: none; background: transparent; color: var(--text);
    font-family: inherit; font-size: 15px; line-height: 1.5; resize: none;
    outline: none; min-height: 22px; max-height: 200px; overflow-y: auto;
  }
  .capture textarea::placeholder { color: var(--text-faint); }
  .capture-bar {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 10px; height: 0; overflow: hidden; transition: height 0.2s;
  }
  .capture:focus-within .capture-bar,
  .capture.has-text .capture-bar { height: 32px; }
  .capture-bar .hint { font-size: 12px; color: var(--text-faint); }
  .capture-bar button {
    background: var(--accent); color: var(--bg); border: none; border-radius: 8px;
    padding: 6px 14px; font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .capture-bar button:disabled {
    background: var(--border-strong); color: var(--text-faint); cursor: not-allowed;
  }

  .date-group { margin-bottom: 18px; }
  .date-head {
    font-size: 11px; font-weight: 600; letter-spacing: 2px;
    text-transform: uppercase; color: var(--text-dim);
    padding: 0 4px 8px;
  }
  .captures-list {
    background: var(--surface); border: 1px solid var(--border-strong);
    border-radius: var(--radius); overflow: hidden;
  }
  .capture-row {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: baseline; gap: 10px;
    -webkit-user-select: none; user-select: none;
    transition: background 0.15s;
  }
  .capture-row:last-child { border-bottom: none; }
  .capture-row.press-active { background: rgba(240, 121, 110, 0.08); }
  .capture-row-body { flex: 1; min-width: 0; }
  .capture-row-text {
    font-size: 13px; line-height: 1.4;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .capture-row-meta {
    font-size: 11px; color: var(--text-faint); margin-top: 2px;
  }

  .route {
    font-size: 10px; padding: 2px 8px; border-radius: 10px;
    font-weight: 500; letter-spacing: 0.3px;
    border: 1px solid transparent; white-space: nowrap; flex-shrink: 0;
  }
  .route-tasks    { background: rgba(55, 138, 221, 0.12); color: #85b7eb; border-color: rgba(55, 138, 221, 0.25); }
  .route-shopping { background: rgba(29, 158, 117, 0.12); color: #5dcaa5; border-color: rgba(29, 158, 117, 0.25); }
  .route-calories { background: rgba(196, 240, 96, 0.12); color: #c4f060; border-color: rgba(196, 240, 96, 0.25); }
  .route-spend    { background: rgba(186, 117, 23, 0.12); color: #f0a955; border-color: rgba(186, 117, 23, 0.3); }
  .route-tobacco  { background: rgba(216, 90, 48, 0.12); color: #f0997b; border-color: rgba(216, 90, 48, 0.3); }
  .route-metric   { background: rgba(168, 172, 180, 0.12); color: var(--text-dim); border-color: var(--border-strong); }
  .route-note     { background: rgba(127, 119, 221, 0.15); color: #afa9ec; border-color: rgba(127, 119, 221, 0.3); }
  .route-reminder { background: rgba(212, 83, 126, 0.12); color: #ed93b1; border-color: rgba(212, 83, 126, 0.3); }
  .route-entry    { background: var(--border); color: var(--text-faint); border-color: var(--border-strong); }
  .route-multi    { background: rgba(168, 172, 180, 0.12); color: var(--text-dim); border-color: var(--border-strong); }

  .loading {
    padding: 18px 16px; text-align: center; font-size: 13px;
    color: var(--text-faint);
  }
  .empty {
    padding: 18px 16px; text-align: center; font-size: 13px;
    color: var(--text-faint); font-style: italic;
  }
  .error-msg {
    padding: 14px 16px; font-size: 13px; color: var(--danger);
    background: rgba(240, 121, 110, 0.08); border: 1px solid rgba(240, 121, 110, 0.25);
    border-radius: var(--radius);
  }

  .load-more {
    text-align: center; padding: 14px;
    color: var(--text-faint); font-size: 13px; cursor: pointer;
    -webkit-user-select: none; user-select: none;
  }
  .load-more:hover { color: var(--accent); }
  .load-more.loading-state { color: var(--text-faint); cursor: default; }

  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--accent); color: var(--bg);
    padding: 12px 20px; border-radius: 12px;
    font-size: 14px; font-weight: 500;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    opacity: 0; transition: all 0.3s ease-out;
    z-index: 100; max-width: 360px; text-align: center;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--danger); color: #fff; }

  /* Confirm modal */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    display: none; align-items: center; justify-content: center;
    z-index: 200; padding: 20px;
  }
  .modal-backdrop.show { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border-strong);
    border-radius: var(--radius); padding: 18px;
    width: 100%; max-width: 360px;
  }
  .modal-title {
    font-size: 14px; font-weight: 600; color: var(--text);
    margin-bottom: 8px;
  }
  .modal-text {
    font-size: 13px; color: var(--text-dim); line-height: 1.5;
    margin-bottom: 16px;
    max-height: 100px; overflow-y: auto;
    padding: 8px 10px; background: var(--bg);
    border-radius: 8px; border: 1px solid var(--border);
    word-break: break-word;
  }
  .modal-warn {
    font-size: 12px; color: var(--text-faint);
    margin-bottom: 16px;
  }
  .modal-actions {
    display: flex; gap: 8px; justify-content: flex-end;
  }
  .modal-actions button {
    border: none; border-radius: 8px; padding: 8px 14px;
    font-family: inherit; font-size: 13px; font-weight: 600;
    cursor: pointer;
  }
  .btn-cancel {
    background: var(--border-strong); color: var(--text);
  }
  .btn-confirm {
    background: var(--danger); color: #fff;
  }
</style>
</head>
<body>

<header>
  <h1>captures</h1>
  <div class="header-right">
    <a class="nav" href="./">← today</a>
  </div>
</header>

<div class="capture" id="capture">
  <textarea id="captureInput" rows="1" placeholder="capture anything..."></textarea>
  <div class="capture-bar">
    <span class="hint">enter to send · shift+enter for newline · long-press row to delete</span>
    <button id="captureBtn" disabled>send</button>
  </div>
</div>

<div id="groupsContainer">
  <div class="loading">loading…</div>
</div>

<div class="load-more" id="loadMore" style="display:none;">load older</div>

<div class="toast" id="toast"></div>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <div class="modal-title">delete capture?</div>
    <div class="modal-text" id="modalText"></div>
    <div class="modal-warn">this removes the entry and all linked rows (tasks, shopping, calories, etc.)</div>
    <div class="modal-actions">
      <button class="btn-cancel" id="btnCancel">cancel</button>
      <button class="btn-confirm" id="btnConfirm">delete</button>
    </div>
  </div>
</div>

<script>
  // ============================================
  // CONFIG
  // ============================================
  const SUPABASE_URL = "https://fwqhomgawlgicqiqqqhw.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ3cWhvbWdhd2xnaWNxaXFxcWh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMTE1NDYsImV4cCI6MjA5Mjc4NzU0Nn0.LF82rWM0rX5FKY0Qo5Vsym_VWgV2reL_U8LkHbfWVHI";
  const CAPTURE_FN_URL = `${SUPABASE_URL}/functions/v1/capture`;
  const REST = `${SUPABASE_URL}/rest/v1`;

  const HEADERS = {
    "apikey": SUPABASE_ANON_KEY,
    "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
    "Content-Type": "application/json",
  };

  const PAGE_SIZE = 50;
  const LONG_PRESS_MS = 500;

  // ============================================
  // STATE
  // ============================================
  let CAPTURES = []; // [{ entry, routes: [{label}] }]
  let OLDEST_LOADED = null; // ISO string of oldest entry created_at
  let HAS_MORE = true;
  let PENDING_DELETE_ID = null;

  // ============================================
  // HELPERS
  // ============================================
  function escapeHtml(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[c]));
  }

  function fmtTime(iso) {
    const d = new Date(iso);
    return d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', timeZone: 'Europe/Budapest' });
  }

  function bpDateOnly(iso) {
    const d = new Date(iso);
    // Convert to Budapest by shifting by GMT+2
    const bp = new Date(d.getTime() + 2 * 3600 * 1000);
    return bp.toISOString().slice(0, 10);
  }

  function todayBP() {
    return bpDateOnly(new Date().toISOString());
  }

  function fmtDateHeader(iso) {
    const today = todayBP();
    const yesterday = new Date(new Date(today + 'T00:00:00').getTime() - 86400000)
      .toISOString().slice(0, 10);
    const dayName = new Date(iso + 'T00:00:00')
      .toLocaleDateString('en-GB', { weekday: 'long' }).toLowerCase();
    const shortDate = new Date(iso + 'T00:00:00')
      .toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }).toLowerCase();
    if (iso === today)     return `today · ${shortDate}`;
    if (iso === yesterday) return `yesterday · ${shortDate}`;
    return `${dayName} · ${shortDate}`;
  }

  function routePill(label) {
    const lcLabel = String(label).toLowerCase();
    const KNOWN = ['tasks', 'shopping', 'calories', 'spend', 'tobacco', 'note', 'reminder', 'entry', 'multi'];
    const cls = KNOWN.includes(lcLabel) ? `route-${lcLabel}` : 'route-metric';
    return `<span class="route ${cls}">${escapeHtml(lcLabel)}</span>`;
  }

  async function sbGet(path) {
    const res = await fetch(`${REST}/${path}`, { headers: HEADERS });
    if (!res.ok) throw new Error(`GET ${path}: ${res.status}`);
    return res.json();
  }

  async function sbDelete(path) {
    const res = await fetch(`${REST}/${path}`, {
      method: "DELETE",
      headers: HEADERS,
    });
    if (!res.ok) throw new Error(`DELETE ${path}: ${res.status}`);
    return true;
  }

  // ============================================
  // FETCH — paged, route detection via entry_id FK
  // ============================================
  async function fetchPage(beforeISO = null) {
    let entriesQ = `entries?select=*&order=created_at.desc&limit=${PAGE_SIZE}`;
    if (beforeISO) entriesQ += `&created_at=lt.${beforeISO}`;
    const entries = await sbGet(entriesQ);
    if (entries.length === 0) return [];

    const entryIds = entries.map(e => e.id);
    const idFilter = `entry_id=in.(${entryIds.join(',')})`;

    const [tasksRows, shoppingRows, notesRows, remindersRows, metricsRows] = await Promise.all([
      sbGet(`tasks?${idFilter}&select=entry_id`),
      sbGet(`shopping?${idFilter}&select=entry_id`),
      sbGet(`notes?${idFilter}&select=entry_id`),
      sbGet(`reminders?${idFilter}&select=entry_id`),
      sbGet(`metrics?${idFilter}&select=entry_id,metric_type`),
    ]);

    // Build lookup: entryId -> Set of route labels (Set dedups)
    const routesByEntry = new Map();
    function add(entryId, label) {
      if (!routesByEntry.has(entryId)) routesByEntry.set(entryId, new Set());
      routesByEntry.get(entryId).add(label);
    }
    tasksRows.forEach(r => add(r.entry_id, 'tasks'));
    shoppingRows.forEach(r => add(r.entry_id, 'shopping'));
    notesRows.forEach(r => add(r.entry_id, 'note'));
    remindersRows.forEach(r => add(r.entry_id, 'reminder'));
    metricsRows.forEach(r => add(r.entry_id, r.metric_type));

    return entries.map(e => {
      const labels = routesByEntry.has(e.id) ? Array.from(routesByEntry.get(e.id)) : [];
      return {
        entry: e,
        routes: labels.map(label => ({ label })),
      };
    });
  }

  async function loadInitial() {
    try {
      const page = await fetchPage();
      CAPTURES = page;
      HAS_MORE = page.length === PAGE_SIZE;
      OLDEST_LOADED = page.length > 0 ? page[page.length - 1].entry.created_at : null;
      render();
    } catch (e) {
      document.getElementById('groupsContainer').innerHTML =
        `<div class="error-msg">load failed: ${escapeHtml(e.message)}</div>`;
    }
  }

  async function loadMore() {
    if (!HAS_MORE || !OLDEST_LOADED) return;
    const btn = document.getElementById('loadMore');
    btn.classList.add('loading-state');
    btn.textContent = 'loading…';
    try {
      const page = await fetchPage(OLDEST_LOADED);
      CAPTURES = CAPTURES.concat(page);
      HAS_MORE = page.length === PAGE_SIZE;
      OLDEST_LOADED = page.length > 0 ? page[page.length - 1].entry.created_at : OLDEST_LOADED;
      render();
    } catch (e) {
      showToast(`✕ load failed: ${e.message}`, true);
    } finally {
      btn.classList.remove('loading-state');
      btn.textContent = 'load older';
    }
  }

  // ============================================
  // DELETE
  // ============================================
  function openDeleteModal(entryId, rawText) {
    PENDING_DELETE_ID = entryId;
    document.getElementById('modalText').textContent = rawText;
    document.getElementById('modalBackdrop').classList.add('show');
  }

  function closeDeleteModal() {
    PENDING_DELETE_ID = null;
    document.getElementById('modalBackdrop').classList.remove('show');
  }

  async function confirmDelete() {
    const id = PENDING_DELETE_ID;
    if (id == null) return;
    const btn = document.getElementById('btnConfirm');
    btn.disabled = true;
    btn.textContent = '…';
    try {
      await sbDelete(`entries?id=eq.${id}`);
      // Optimistically drop from local list
      CAPTURES = CAPTURES.filter(c => c.entry.id !== id);
      render();
      showToast('✓ deleted');
      closeDeleteModal();
    } catch (e) {
      showToast(`✕ delete failed: ${e.message}`, true);
    } finally {
      btn.disabled = false;
      btn.textContent = 'delete';
    }
  }

  // ============================================
  // LONG-PRESS BINDING (delegated)
  // ============================================
  function attachLongPress(container) {
    let timer = null;
    let activeEl = null;
    let triggered = false;

    function start(e) {
      const row = e.target.closest('.capture-row');
      if (!row || !row.dataset.entryId) return;
      activeEl = row;
      triggered = false;
      row.classList.add('press-active');
      timer = setTimeout(() => {
        triggered = true;
        // Vibrate if available
        if (navigator.vibrate) navigator.vibrate(30);
        openDeleteModal(Number(row.dataset.entryId), row.dataset.rawText || '');
        if (activeEl) activeEl.classList.remove('press-active');
      }, LONG_PRESS_MS);
    }
    function cancel() {
      if (timer) { clearTimeout(timer); timer = null; }
      if (activeEl) activeEl.classList.remove('press-active');
      activeEl = null;
    }

    container.addEventListener('touchstart', start, { passive: true });
    container.addEventListener('touchend', cancel);
    container.addEventListener('touchmove', cancel);
    container.addEventListener('touchcancel', cancel);
    container.addEventListener('mousedown', start);
    container.addEventListener('mouseup', cancel);
    container.addEventListener('mouseleave', cancel);
    // Prevent context menu firing on long-press desktop right-click conflict
    container.addEventListener('contextmenu', e => {
      if (e.target.closest('.capture-row')) e.preventDefault();
    });
  }

  // ============================================
  // RENDER
  // ============================================
  function render() {
    const container = document.getElementById('groupsContainer');
    if (CAPTURES.length === 0) {
      container.innerHTML = '<div class="empty">no captures yet</div>';
      document.getElementById('loadMore').style.display = 'none';
      return;
    }

    // Group by Budapest date
    const groups = new Map(); // dateISO -> rows[]
    CAPTURES.forEach(c => {
      const d = bpDateOnly(c.entry.created_at);
      if (!groups.has(d)) groups.set(d, []);
      groups.get(d).push(c);
    });

    // Render groups in order (already sorted by created_at desc)
    let html = '';
    for (const [date, rows] of groups) {
      html += `<div class="date-group">`;
      html += `<div class="date-head">${fmtDateHeader(date)}</div>`;
      html += `<div class="captures-list">`;
      html += rows.map(c => {
        const time = fmtTime(c.entry.created_at);
        const labels = c.routes.length === 0
          ? ['entry']
          : c.routes.map(r => r.label);
        const routeStr = labels.join(', ');
        const pill = labels.length === 1
          ? routePill(labels[0])
          : routePill('multi');
        return `
          <div class="capture-row" data-entry-id="${c.entry.id}" data-raw-text="${escapeHtml(c.entry.raw_text)}">
            <div class="capture-row-body">
              <div class="capture-row-text">${escapeHtml(c.entry.raw_text)}</div>
              <div class="capture-row-meta">${time} · → ${escapeHtml(routeStr)}</div>
            </div>
            ${pill}
          </div>
        `;
      }).join('');
      html += `</div></div>`;
    }

    container.innerHTML = html;
    document.getElementById('loadMore').style.display = HAS_MORE ? 'block' : 'none';
  }

  // ============================================
  // TOAST
  // ============================================
  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.className = 'toast' + (isError ? ' error' : '');
    t.textContent = msg;
    t.classList.add('show');
    if (window._toastTimer) clearTimeout(window._toastTimer);
    window._toastTimer = setTimeout(() => {
      t.classList.remove('show');
    }, 2400);
  }

  // ============================================
  // CAPTURE INPUT
  // ============================================
  const captureBox = document.getElementById('capture');
  const captureInput = document.getElementById('captureInput');
  const captureBtn = document.getElementById('captureBtn');

  function autosize() {
    captureInput.style.height = 'auto';
    captureInput.style.height = Math.min(captureInput.scrollHeight, 200) + 'px';
  }
  captureInput.addEventListener('input', () => {
    autosize();
    const has = captureInput.value.trim().length > 0;
    captureBtn.disabled = !has;
    captureBox.classList.toggle('has-text', has);
  });
  captureInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  captureBtn.addEventListener('click', send);

  async function send() {
    const text = captureInput.value.trim();
    if (!text) return;
    captureBtn.disabled = true;
    captureBtn.textContent = "…";

    try {
      const res = await fetch(CAPTURE_FN_URL, {
        method: "POST",
        headers: { ...HEADERS },
        body: JSON.stringify({ text }),
      });
      const data = await res.json();
      if (!res.ok || !data.ok) {
        showToast(`✕ ${data.error || "capture failed"}`, true);
        console.error(data);
        return;
      }
      captureInput.value = "";
      autosize();
      captureBox.classList.remove('has-text');
      showToast(data.summary || "✓ logged");
      loadInitial(); // reset to first page so new capture appears at top
    } catch (e) {
      showToast(`✕ network: ${e.message}`, true);
    } finally {
      captureBtn.disabled = false;
      captureBtn.textContent = "send";
    }
  }

  // Modal wiring
  document.getElementById('btnCancel').addEventListener('click', closeDeleteModal);
  document.getElementById('btnConfirm').addEventListener('click', confirmDelete);
  document.getElementById('modalBackdrop').addEventListener('click', e => {
    if (e.target.id === 'modalBackdrop') closeDeleteModal();
  });

  // Long-press wiring (delegated to groupsContainer)
  attachLongPress(document.getElementById('groupsContainer'));

  document.getElementById('loadMore').addEventListener('click', loadMore);

  loadInitial();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0d0f12" />
<title>Motracker — trackers</title>
<link rel="stylesheet" href="./nav.css" />
<script src="./nav.js" defer></script>
<style>
  :root {
    --bg: #0d0f12;
    --surface: #161a20;
    --surface-hover: #1c2026;
    --border: #22262c;
    --border-strong: #2a2d33;
    --text: #e8e8e8;
    --text-dim: #a8acb4;
    --text-faint: #6a6e76;
    --accent: #c4f060;
    --accent-dim: #9bb84c;
    --spend: #f0a955;
    --danger: #f0796e;
    --edit: #85b7eb;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--bg); }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    color: var(--text);
    padding: 16px 16px 80px;
    max-width: 460px;
    margin: 0 auto;
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* period sub-tabs */
  .period-tabs {
    display: flex; gap: 6px;
    background: var(--surface); border: 1px solid var(--border-strong);
    border-radius: var(--radius); padding: 4px;
    margin-bottom: 18px;
  }
  .period-tab {
    flex: 1; text-align: center;
    padding: 8px 0; font-size: 12px; font-weight: 600;
    letter-spacing: 1px; text-transform: uppercase;
    color: var(--text-faint);
    background: transparent; border: none; cursor: pointer;
    border-radius: 10px;
    transition: background 0.15s, color 0.15s;
  }
  .period-tab.active { background: var(--surface-hover); color: var(--text); }

  section { margin-bottom: 22px; }
  .section-head {
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 0 4px 8px;
    -webkit-user-select: none; user-select: none;
  }
  .section-head h2 {
    font-size: 11px; font-weight: 600; letter-spacing: 2px;
    text-transform: uppercase; color: var(--text-dim);
  }
  .section-head .count { font-size: 12px; color: var(--text-faint); font-variant-numeric: tabular-nums; }

  .card {
    background: var(--surface); border: 1px solid var(--border-strong);
    border-radius: var(--radius); padding: 14px;
  }

  .tk-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .tk-row:last-child { border-bottom: none; }
  .tk-row:first-child { padding-top: 4px; }
  .tk-row:last-child { padding-bottom: 4px; }

  .tk-meta {
    flex: 0 0 90px;
    min-width: 0;
  }
  .tk-label {
    font-size: 13px; color: var(--text); font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .tk-sub {
    font-size: 10px; color: var(--text-faint);
    margin-top: 2px; letter-spacing: 0.3px;
    font-variant-numeric: tabular-nums;
  }

  /* heatmap (booleans) */
  .heatmap {
    flex: 1;
    display: grid;
    gap: 3px;
    grid-auto-flow: column;
  }
  .heatmap-cell {
    aspect-ratio: 1;
    border-radius: 3px;
    background: var(--border);
    min-width: 0;
  }
  .heatmap-cell.on  { background: var(--accent); }
  .heatmap-cell.future { background: transparent; border: 1px dashed var(--border); }
  .heatmap-cell.today { outline: 1px solid var(--edit); outline-offset: 1px; }

  /* bars (counters) */
  .bars {
    flex: 1;
    display: grid;
    gap: 3px;
    grid-auto-flow: column;
    align-items: end;
    height: 36px;
  }
  .bar-cell {
    background: var(--border);
    border-radius: 2px;
    min-height: 2px;
    min-width: 0;
    position: relative;
  }
  .bar-cell.target-met { background: var(--accent); }
  .bar-cell.over { background: var(--spend); }
  .bar-cell.bad { background: var(--danger); }
  .bar-cell.zero { background: var(--border); }
  .bar-cell.today { outline: 1px solid var(--edit); outline-offset: 1px; }

  /* chore reset timeline: dots on horizontal axis */
  .timeline {
    flex: 1;
    position: relative;
    height: 24px;
    background: var(--border);
    border-radius: 4px;
  }
  .timeline-dot {
    position: absolute;
    top: 50%;
    width: 6px; height: 6px;
    margin-left: -3px; margin-top: -3px;
    background: var(--accent);
    border-radius: 50%;
  }
  .timeline-today-mark {
    position: absolute;
    top: -2px; bottom: -2px;
    width: 1px;
    background: var(--edit);
    right: 0;
  }

  .loading {
    padding: 18px 16px; text-align: center; font-size: 13px;
    color: var(--text-faint);
  }
  .empty {
    padding: 22px 16px; text-align: center; font-size: 13px;
    color: var(--text-faint);
  }
  .error-msg {
    padding: 18px 16px; text-align: center; font-size: 13px;
    color: var(--danger);
  }

  .date-axis {
    display: flex; justify-content: space-between;
    padding: 6px 4px 0 100px;
    font-size: 10px; color: var(--text-faint);
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>

<div class="period-tabs" id="periodTabs">
  <button class="period-tab active" data-days="7">7d</button>
  <button class="period-tab" data-days="30">30d</button>
  <button class="period-tab" data-days="90">90d</button>
</div>

<section>
  <div class="section-head"><h2>habits</h2></div>
  <div class="card" id="habitsCard"><div class="loading">loading…</div></div>
</section>

<section>
  <div class="section-head"><h2>counters</h2></div>
  <div class="card" id="countersCard"><div class="loading">loading…</div></div>
</section>

<section>
  <div class="section-head">
    <h2>chores</h2>
    <span class="count" id="choresCount"></span>
  </div>
  <div class="card" id="choresCard"><div class="loading">loading…</div></div>
</section>

<script>
  const SUPABASE_URL = "https://fwqhomgawlgicqiqqqhw.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ3cWhvbWdhd2xnaWNxaXFxcWh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMTE1NDYsImV4cCI6MjA5Mjc4NzU0Nn0.LF82rWM0rX5FKY0Qo5Vsym_VWgV2reL_U8LkHbfWVHI";
  const REST = `${SUPABASE_URL}/rest/v1`;
  const HEADERS = {
    "apikey": SUPABASE_ANON_KEY,
    "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
  };

  document.addEventListener('DOMContentLoaded', () => {
    MotrackerNav.init({ active: 'today', sub: 'trackers', title: 'trackers' });
    wirePeriodTabs();
    loadAll();
  });

  const TODAY  = window.MT_TODAY || new Date().toISOString().slice(0, 10);
  // trackers history is always "ending today" — VIEW_DATE not used for past navigation here
  let PERIOD_DAYS = 7;

  function wirePeriodTabs() {
    document.querySelectorAll('.period-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.period-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        PERIOD_DAYS = +btn.dataset.days;
        loadAll();
      });
    });
  }

  // ---- tracker config (mirrors index.html) ----
  // workout_done   = trained (gym, run, structured session)
  // workout_active = moved (long walk, hike, manual labor, sport with friends)
  // Both are SEPARATE activities, not states. Both can be true on the same day.
  // cig_factory and cig_rolled are also SEPARATE — different products, tracked separately by intent.
  const HABIT_TRACKERS = [
    { key: 'workout_done',   metric_type: 'workout_done',   unit: 'done', label: 'workout' },
    { key: 'workout_active', metric_type: 'workout_active', unit: 'done', label: 'active day' },
  ];
  const COUNTER_TRACKERS = [
    { key: 'coffee',      metric_type: 'coffee',      unit: 'cups', label: 'coffee',     softCap: 3,    fmt: v => `${v}` },
    { key: 'water',       metric_type: 'water',       unit: 'ml',   label: 'water',      target: 2000,  fmt: v => `${(v/1000).toFixed(1)}L` },
    { key: 'cig_factory', metric_type: 'cig_factory', unit: 'cigs', label: 'cig (fac.)', target: 0,     fmt: v => `${v}` },
    { key: 'cig_rolled',  metric_type: 'cig_rolled',  unit: 'cigs', label: 'cig (rol.)', target: 0,     fmt: v => `${v}` },
  ];
  const CHORES = [
    { key: 'dishes',   metric_type: 'chore_dishes',   label: 'dishes',   cadence: 3 },
    { key: 'living',   metric_type: 'chore_living',   label: 'living',   cadence: 3 },
    { key: 'bathroom', metric_type: 'chore_bathroom', label: 'bathroom', cadence: 7 },
    { key: 'kitchen',  metric_type: 'chore_kitchen',  label: 'kitchen',  cadence: 7 },
  ];

  async function sbGet(path) {
    const res = await fetch(`${REST}/${path}`, { headers: HEADERS });
    if (!res.ok) throw new Error(`GET ${path}: ${res.status}`);
    return res.json();
  }

  function daysArray(n) {
    // returns array of ISO dates ending TODAY, oldest first
    const out = [];
    const t = new Date(TODAY + 'T00:00:00');
    for (let i = n - 1; i >= 0; i--) {
      const d = new Date(t);
      d.setDate(d.getDate() - i);
      out.push(d.toISOString().slice(0, 10));
    }
    return out;
  }

  function fmtShortDate(iso) {
    const d = new Date(iso + 'T00:00:00');
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }).toLowerCase();
  }

  async function loadAll() {
    const dates = daysArray(PERIOD_DAYS);
    const start = dates[0];
    const dailyTypes = [...new Set([
      ...HABIT_TRACKERS.map(c => c.metric_type),
      ...COUNTER_TRACKERS.map(c => c.metric_type),
    ])];
    const choreTypes = CHORES.map(c => c.metric_type);
    try {
      const [dailyRows, choreRows] = await Promise.all([
        sbGet(`metrics?date=gte.${start}&date=lte.${TODAY}&metric_type=in.(${dailyTypes.join(',')})&select=date,metric_type,unit,value&order=date.asc`),
        sbGet(`metrics?metric_type=in.(${choreTypes.join(',')})&date=gte.${start}&date=lte.${TODAY}&select=metric_type,created_at&order=created_at.asc`),
      ]);
      const idx = new Map();
      dailyRows.forEach(r => {
        idx.set(`${r.metric_type}|${r.unit}|${r.date}`, +r.value);
      });
      // group chore resets by metric_type
      const resetsByType = new Map();
      choreTypes.forEach(t => resetsByType.set(t, []));
      choreRows.forEach(r => {
        resetsByType.get(r.metric_type)?.push(r.created_at);
      });
      renderHabits(dates, idx);
      renderCounters(dates, idx);
      renderChores(dates, resetsByType);
    } catch (e) {
      console.error(e);
      document.getElementById('habitsCard').innerHTML =
        `<div class="error-msg">load failed: ${escapeHtml(e.message)}</div>`;
      document.getElementById('countersCard').innerHTML = '';
      document.getElementById('choresCard').innerHTML = '';
    }
  }

  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  function renderHabits(dates, idx) {
    const rows = HABIT_TRACKERS.map(cfg => {
      const cells = dates.map(d => {
        const v = idx.get(`${cfg.metric_type}|${cfg.unit}|${d}`);
        const on = v != null && v >= 1;
        const today = d === TODAY ? ' today' : '';
        return `<div class="heatmap-cell ${on ? 'on' : ''}${today}"></div>`;
      }).join('');
      const total = dates.reduce((s, d) => {
        const v = idx.get(`${cfg.metric_type}|${cfg.unit}|${d}`);
        return s + (v != null && v >= 1 ? 1 : 0);
      }, 0);
      return `
        <div class="tk-row">
          <div class="tk-meta">
            <div class="tk-label">${cfg.label}</div>
            <div class="tk-sub">${total}/${dates.length} days</div>
          </div>
          <div class="heatmap" style="grid-template-columns: repeat(${dates.length}, 1fr);">
            ${cells}
          </div>
        </div>`;
    }).join('');
    document.getElementById('habitsCard').innerHTML = rows;
  }

  function renderCounters(dates, idx) {
    const rows = COUNTER_TRACKERS.map(cfg => {
      // compute max value across the period for scaling
      const vals = dates.map(d => idx.get(`${cfg.metric_type}|${cfg.unit}|${d}`) || 0);
      const peakRaw = Math.max(...vals);
      // for target=0 (cigs) use peak (any value is "bad"); for target>0 (water) use max(peak, target); for softCap (coffee) use max(peak, softCap*2)
      let scale;
      if (cfg.target && cfg.target > 0)      scale = Math.max(peakRaw, cfg.target);
      else if (cfg.softCap)                  scale = Math.max(peakRaw, cfg.softCap * 1.3);
      else                                   scale = Math.max(peakRaw, 1);

      const cells = dates.map((d, i) => {
        const v = vals[i];
        const h = v <= 0 ? 0 : Math.max(2, (v / scale) * 100);
        let cls = 'zero';
        if (v > 0) {
          if (cfg.target === 0)                                cls = 'bad';
          else if (cfg.softCap && v > cfg.softCap)             cls = 'over';
          else if (cfg.target && v >= cfg.target)              cls = 'target-met';
          else                                                 cls = '';
        }
        const today = d === TODAY ? ' today' : '';
        const title = `${fmtShortDate(d)}: ${cfg.fmt(v)}`;
        return `<div class="bar-cell ${cls}${today}" style="height: ${h}%" title="${title}"></div>`;
      }).join('');

      const total = vals.reduce((a, b) => a + b, 0);
      const avg = total / dates.length;
      const subText = cfg.target === 0
        ? `${total} total · avg ${avg.toFixed(1)}/d`
        : `avg ${cfg.fmt(avg)}/d`;

      return `
        <div class="tk-row">
          <div class="tk-meta">
            <div class="tk-label">${cfg.label}</div>
            <div class="tk-sub">${subText}</div>
          </div>
          <div class="bars" style="grid-template-columns: repeat(${dates.length}, 1fr);">
            ${cells}
          </div>
        </div>`;
    }).join('');
    document.getElementById('countersCard').innerHTML = rows;
  }

  function renderChores(dates, resetsByType) {
    const start = new Date(dates[0] + 'T00:00:00').getTime();
    const end = new Date(dates[dates.length - 1] + 'T23:59:59').getTime();
    const span = end - start;

    let totalResets = 0;
    const rows = CHORES.map(cfg => {
      const resets = resetsByType.get(cfg.metric_type) || [];
      totalResets += resets.length;
      const dots = resets.map(iso => {
        const t = new Date(iso).getTime();
        const pct = Math.max(0, Math.min(100, ((t - start) / span) * 100));
        const label = new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }).toLowerCase();
        return `<div class="timeline-dot" style="left:${pct}%" title="${label}"></div>`;
      }).join('');
      const lastReset = resets.length > 0 ? resets[resets.length - 1] : null;
      let sub = 'never';
      if (lastReset) {
        const hours = (Date.now() - new Date(lastReset).getTime()) / 3600000;
        if (hours < 24) sub = `${Math.floor(hours)}h ago`;
        else sub = `${Math.floor(hours / 24)}d ago`;
      }
      return `
        <div class="tk-row">
          <div class="tk-meta">
            <div class="tk-label">${cfg.label}</div>
            <div class="tk-sub">${resets.length} reset${resets.length === 1 ? '' : 's'} · ${sub}</div>
          </div>
          <div class="timeline">
            ${dots}
            <div class="timeline-today-mark"></div>
          </div>
        </div>`;
    }).join('');

    document.getElementById('choresCount').textContent =
      `${totalResets} reset${totalResets === 1 ? '' : 's'} in ${dates.length}d`;
    document.getElementById('choresCard').innerHTML = rows;
  }
</script>
</body>
</html>

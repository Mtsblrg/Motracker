<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0d0f12" />
<title>Motracker — budget</title>
<style>
  :root {
    --bg: #0d0f12;
    --surface: #161a20;
    --surface-hover: #1c2026;
    --border: #22262c;
    --border-strong: #2a2d33;
    --text: #e8e8e8;
    --text-dim: #a8acb4;
    --text-faint: #6a6e76;
    --accent: #c4f060;
    --spend: #f0a955;
    --spend-dim: #ba7517;
    --danger: #f0796e;
    --danger-bg: rgba(240, 121, 110, 0.15);
    --travel: #afa9ec;
    --travel-dim: #7f77dd;
    --recur: #85b7eb;
    --recur-dim: #378add;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--bg); }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    color: var(--text);
    padding: 16px 16px 80px;
    max-width: 460px;
    margin: 0 auto;
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
  }

  header {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 18px; padding: 4px 4px 0;
  }
  header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.5px; color: var(--spend); }
  .header-right { display: flex; align-items: baseline; gap: 14px; }
  .header-right .nav { font-size: 13px; color: var(--text-faint); text-decoration: none; }
  .header-right .nav:hover { color: var(--accent); }

  /* CYCLE PICKER */
  .cycle-picker {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface); border: 1px solid var(--border-strong);
    border-radius: 10px; padding: 6px 8px;
    margin-bottom: 14px;
  }
  .cycle-picker .nav-btn {
    background: transparent; border: 1px solid var(--border-strong);
    color: var(--text-dim); padding: 4px 12px; border-radius: 6px;
    cursor: pointer; font-size: 14px; font-family: inherit;
    line-height: 1;
  }
  .cycle-picker .nav-btn:disabled { color: var(--text-faint); opacity: 0.4; cursor: not-allowed; }
  .cycle-picker .nav-btn:not(:disabled):active { background: var(--surface-hover); }
  .cycle-label {
    font-size: 13px; color: var(--text); font-weight: 500;
    text-align: center; flex: 1; font-variant-numeric: tabular-nums;
  }
  .cycle-label .current-badge {
    margin-left: 6px; font-size: 10px; padding: 1px 6px;
    border-radius: 8px; background: rgba(196, 240, 96, 0.12);
    color: var(--accent); border: 1px solid rgba(196, 240, 96, 0.25);
    font-weight: 600; letter-spacing: 0.3px;
  }

  section { margin-bottom: 22px; }
  .section-head {
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 0 4px 8px;
    -webkit-user-select: none; user-select: none;
  }
  .section-head h2 {
    font-size: 11px; font-weight: 600; letter-spacing: 2px;
    text-transform: uppercase; color: var(--text-dim);
  }
  .section-head .total { font-size: 13px; color: var(--spend); font-weight: 600; font-variant-numeric: tabular-nums; }
  .section-head .total.travel { color: var(--travel); }
  .section-head .total.recur { color: var(--recur); }

  .card {
    background: var(--surface); border: 1px solid var(--border-strong);
    border-radius: var(--radius); padding: 16px;
  }

  /* CYCLE summary card */
  .cycle-head {
    display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px;
  }
  .cycle-amount {
    font-size: 22px; font-weight: 600; color: var(--text);
    letter-spacing: -0.3px; font-variant-numeric: tabular-nums;
  }
  .cycle-amount .unit {
    font-size: 13px; font-weight: 400; color: var(--text-dim); margin-left: 4px;
  }
  .cycle-amount.over { color: var(--danger); }
  .cycle-pct {
    font-size: 15px; font-weight: 600; color: var(--spend);
    font-variant-numeric: tabular-nums;
  }
  .cycle-pct.over { color: var(--danger); }
  .cycle-sub {
    font-size: 12px; color: var(--text-faint); margin-bottom: 12px;
  }
  .bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; position: relative; }
  .bar-fill { height: 100%; background: var(--spend); border-radius: 4px; transition: width 0.4s ease-out; }
  .bar-fill.over { background: var(--danger); }
  .bar-marker {
    position: absolute; top: -2px; bottom: -2px; width: 2px;
    background: var(--accent); border-radius: 1px;
  }
  .cycle-foot {
    margin-top: 10px; font-size: 13px; color: var(--text-dim);
    display: flex; justify-content: space-between;
    font-variant-numeric: tabular-nums;
  }
  .cycle-foot .label { color: var(--text-faint); font-size: 12px; }
  .cycle-foot .value { color: var(--text); font-weight: 500; }
  .cycle-foot .value.over { color: var(--danger); }

  /* daily allowance hero */
  .daily-hero {
    margin-top: 14px; padding-top: 14px;
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: baseline; gap: 12px;
  }
  .daily-hero-body { flex: 1; min-width: 0; }
  .daily-hero-label {
    font-size: 11px; color: var(--text-dim); letter-spacing: 1.5px;
    text-transform: uppercase; margin-bottom: 4px;
  }
  .daily-hero-amount {
    font-size: 26px; font-weight: 700; color: var(--accent);
    letter-spacing: -0.5px; font-variant-numeric: tabular-nums;
  }
  .daily-hero-amount.over { color: var(--danger); }
  .daily-hero-amount .unit {
    font-size: 14px; font-weight: 400; color: var(--text-dim); margin-left: 4px;
  }
  .daily-hero-pace {
    text-align: right; font-size: 12px;
    color: var(--text-faint); line-height: 1.5;
  }
  .daily-hero-pace .pace-actual { color: var(--spend); font-weight: 600; }

  /* TWO-LEVEL ACCORDION: category > merchant > txns */
  .accordion-list {
    background: var(--surface); border: 1px solid var(--border-strong);
    border-radius: var(--radius); overflow: hidden;
  }
  .cat-block { border-bottom: 1px solid var(--border); }
  .cat-block:last-child { border-bottom: none; }
  .cat-row {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px;
    cursor: pointer;
    transition: background 0.15s ease;
    -webkit-user-select: none; user-select: none;
  }
  .cat-row:active { background: var(--surface-hover); }
  .cat-chevron {
    flex-shrink: 0; width: 14px; font-size: 10px;
    color: var(--text-faint); text-align: center;
    transition: transform 0.2s ease;
  }
  .cat-block.expanded .cat-chevron { transform: rotate(90deg); }
  .cat-body { flex: 1; min-width: 0; }
  .cat-label {
    font-size: 14px; color: var(--text); font-weight: 500;
    text-transform: capitalize;
  }
  .cat-sub {
    font-size: 11px; color: var(--text-faint); margin-top: 2px;
  }
  .cat-bar-wrap {
    flex: 0 0 60px;
    height: 4px; background: var(--border);
    border-radius: 2px; overflow: hidden;
  }
  .cat-bar-fill {
    height: 100%; background: var(--spend); border-radius: 2px;
  }
  .cat-bar-fill.travel { background: var(--travel); }
  .cat-bar-fill.recur  { background: var(--recur); }
  .cat-amount {
    font-size: 14px; color: var(--text); font-weight: 600;
    font-variant-numeric: tabular-nums;
    flex-shrink: 0; white-space: nowrap; min-width: 70px; text-align: right;
  }

  /* level 2 — merchant inside category */
  .cat-merchants {
    display: none;
    background: rgba(0, 0, 0, 0.15);
    border-top: 1px solid var(--border);
  }
  .cat-block.expanded .cat-merchants { display: block; }
  .mer-block { border-bottom: 1px solid var(--border); }
  .mer-block:last-child { border-bottom: none; }
  .mer-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px 10px 32px;
    cursor: pointer;
    transition: background 0.15s ease;
    -webkit-user-select: none; user-select: none;
  }
  .mer-row.single-txn { cursor: default; }
  .mer-row:not(.single-txn):active { background: rgba(255,255,255,0.02); }
  .mer-chevron {
    flex-shrink: 0; width: 12px; font-size: 9px;
    color: var(--text-faint); text-align: center;
    transition: transform 0.2s ease;
  }
  .mer-block.expanded .mer-chevron { transform: rotate(90deg); }
  .mer-block.single-txn .mer-chevron { opacity: 0; }
  .mer-body { flex: 1; min-width: 0; }
  .mer-name {
    font-size: 13px; color: var(--text); line-height: 1.3;
    word-wrap: break-word;
  }
  .mer-sub {
    font-size: 10px; color: var(--text-faint); margin-top: 1px;
  }
  .mer-amount {
    font-size: 13px; color: var(--text); font-weight: 600;
    font-variant-numeric: tabular-nums;
    flex-shrink: 0; white-space: nowrap;
  }
  .mer-amount.travel { color: var(--travel); }
  .mer-amount.recur  { color: var(--recur); }

  /* level 3 — txns inside merchant */
  .mer-txns {
    display: none;
    background: rgba(0, 0, 0, 0.25);
  }
  .mer-block.expanded .mer-txns { display: block; }
  .txn-row {
    padding: 8px 14px 8px 56px;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center; gap: 12px;
    -webkit-user-select: none; user-select: none;
    position: relative;
    transition: background 0.15s ease;
  }
  .txn-row:last-child { border-bottom: none; }
  .txn-row.long-pressable.pressing {
    background: var(--danger-bg);
    transform: scale(0.99);
    transition: background 0.5s ease-out, transform 0.5s ease-out;
  }
  .txn-row.armed { background: var(--danger-bg); padding: 8px 14px; }
  .txn-date {
    font-size: 11px; color: var(--text-faint);
    font-variant-numeric: tabular-nums;
    min-width: 50px;
  }
  .txn-tags {
    flex: 1; display: flex; gap: 4px; align-items: center;
    flex-wrap: wrap;
  }
  .txn-tag {
    font-size: 9px; padding: 1px 5px; border-radius: 6px;
    border: 1px solid var(--border-strong); color: var(--text-faint);
  }
  .txn-tag.travel { color: var(--travel); border-color: rgba(127, 119, 221, 0.3); }
  .txn-tag.recur  { color: var(--recur);  border-color: rgba(55, 138, 221, 0.3); }
  .txn-amount {
    font-size: 12px; color: var(--text-dim); font-weight: 500;
    font-variant-numeric: tabular-nums;
    flex-shrink: 0; white-space: nowrap;
  }
  /* armed state — delete bar */
  .action-bar {
    display: flex; align-items: center; gap: 8px; width: 100%;
    font-size: 12px; color: var(--text-dim);
  }
  .action-bar .label { flex: 1; }
  .action-btn {
    border: none;
    padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600;
    cursor: pointer; letter-spacing: 0.3px;
    font-family: inherit;
  }
  .action-btn.delete { background: var(--danger); color: #fff; }
  .action-btn.cancel {
    background: transparent; color: var(--text-dim);
    border: 1px solid var(--border-strong);
  }

  /* recurring flat list */
  .recur-row {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    -webkit-user-select: none; user-select: none;
    position: relative;
    transition: background 0.15s ease;
  }
  .recur-row:last-child { border-bottom: none; }
  .recur-row.long-pressable.pressing {
    background: var(--danger-bg);
    transform: scale(0.99);
    transition: background 0.5s ease-out, transform 0.5s ease-out;
  }
  .recur-row.armed { background: var(--danger-bg); }
  .recur-body { flex: 1; min-width: 0; }
  .recur-name { font-size: 14px; color: var(--text); }
  .recur-sub { font-size: 11px; color: var(--text-faint); margin-top: 2px; }
  .recur-amount {
    font-size: 14px; color: var(--recur); font-weight: 600;
    font-variant-numeric: tabular-nums;
    flex-shrink: 0; white-space: nowrap;
  }

  .loading {
    padding: 18px 16px; text-align: center; font-size: 13px;
    color: var(--text-faint);
  }
  .empty {
    padding: 18px 16px; text-align: center; font-size: 13px;
    color: var(--text-faint); font-style: italic;
  }
  .error-msg {
    padding: 14px 16px; font-size: 13px; color: var(--danger);
    background: rgba(240, 121, 110, 0.08); border: 1px solid rgba(240, 121, 110, 0.25);
    border-radius: var(--radius);
  }

  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border-strong);
    padding: 10px 8px 10px 18px; border-radius: 12px;
    font-size: 14px; font-weight: 500;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    opacity: 0; transition: all 0.3s ease-out;
    z-index: 100; max-width: 360px; text-align: center;
    display: flex; align-items: center; gap: 14px;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--danger); color: #fff; border-color: var(--danger); }
  .toast .toast-msg { flex: 1; text-align: left; }
  .toast .toast-action {
    background: transparent;
    color: var(--accent);
    border: none;
    padding: 6px 12px;
    font-family: inherit;
    font-size: 13px; font-weight: 600;
    cursor: pointer;
    border-radius: 8px; letter-spacing: 0.5px;
  }
  .toast .toast-action:active { background: rgba(196, 240, 96, 0.1); }
</style>
</head>
<body>

<header>
  <h1>budget</h1>
  <div class="header-right">
    <a class="nav" href="./">← today</a>
    <a class="nav" href="./spend.html">spend</a>
    <a class="nav" href="./capture.html">captures →</a>
  </div>
</header>

<div class="cycle-picker">
  <button class="nav-btn" id="cyclePrev">‹</button>

<section>

    <span class="total" id="cycleWindow">—</span>

    <div class="loading">loading…</div>

</section>

<section>
  <div class="section-head">
    <h2>discretionary by category</h2>
    <span class="total" id="discTotal">—</span>

  <div class="accordion-list" id="catList">
    <div class="loading">loading…</div>
  </div>
</section>

<section>
  <div class="section-head">
    <h2>travel</h2>

  </div>

    <div class="loading">loading…</div>
  </div>
</section>

<section>
  <div class="section-head">
    <h2>recurring</h2>
    <span class="total recur" id="recurTotalLabel">—</span>
  </div>
  <div class="accordion-list" id="recurList">
    <div class="loading">loading…</div>
  </div>
</section>

<div class="toast" id="toast"></div>

<script>
  const SUPABASE_URL = "https://fwqhomgawlgicqiqqqhw.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ3cWhvbWdhd2xnaWNxaXFxcWh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMTE1NDYsImV4cCI6MjA5Mjc4NzU0Nn0.LF82rWM0rX5FKY0Qo5Vsym_VWgV2reL_U8LkHbfWVHI";
  const REST = `${SUPABASE_URL}/rest/v1`;
  const HEADERS = {
    "apikey": SUPABASE_ANON_KEY,
    "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
    "Content-Type": "application/json",
  };
  const LONG_PRESS_MS = 500;
  const UNDO_TIMEOUT_MS = 5000;

  function escapeHtml(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[c]));
  }
  function bpDateISO(d = new Date()) {
    const fmt = new Intl.DateTimeFormat('en-CA', {
      timeZone: 'Europe/Budapest',
      year: 'numeric', month: '2-digit', day: '2-digit',
    });
    return fmt.format(d);
  }
  function fmtShortDate(iso) {
    const d = new Date(iso + 'T00:00:00');
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }).toLowerCase();
  }
  function fmtMonthShort(iso) {
    const d = new Date(iso + 'T00:00:00');
    return d.toLocaleDateString('en-GB', { month: 'short', year: '2-digit' }).toLowerCase();
  }
  function fmtHUF(n) {
    return Math.round(n).toLocaleString('en-GB') + ' HUF';
  }
  async function sbGet(path) {
    const res = await fetch(`${REST}/${path}`, { headers: HEADERS });
    if (!res.ok) throw new Error(`GET ${path}: ${res.status}`);
    return res.json();
  }
  async function sbDelete(path) {
    const res = await fetch(`${REST}/${path}`, { method: "DELETE", headers: HEADERS });
    if (!res.ok) {
      const t = await res.text();
      throw new Error(`DELETE ${path}: ${res.status} ${t}`);
    }
    return true;
  }

  const TODAY = bpDateISO();
  let CYCLE_OFFSET = 0; // 0 = current, -1 = previous, +1 = next
  let LOADED_ROWS = [];  // cached rows for current view (used by delete)

  // ---- Cycle math: 5th -> 4th next month, Europe/Budapest ----
  // offset 0 = the cycle containing TODAY, -1 = previous, +1 = next
  function computeCycle(offset = 0) {
    const [tY, tM, tD] = TODAY.split('-').map(Number);
    let startY = tY, startM = tM;
    if (tD < 5) {
      startM -= 1;
      if (startM === 0) { startM = 12; startY -= 1; }
    }
    // apply offset (months)
    startM += offset;
    while (startM <= 0)  { startM += 12; startY -= 1; }
    while (startM > 12)  { startM -= 12; startY += 1; }

    const startStr = `${startY}-${String(startM).padStart(2,'0')}-05`;
    let endY = startY, endM = startM + 1;
    if (endM === 13) { endM = 1; endY += 1; }
    const endStr = `${endY}-${String(endM).padStart(2,'0')}-04`;

    const startD = new Date(startStr + 'T00:00:00Z');
    const endD   = new Date(endStr   + 'T00:00:00Z');
    const todayD = new Date(TODAY    + 'T00:00:00Z');
    const totalDays = Math.round((endD - startD) / 86400000) + 1;

    const isCurrent = (todayD >= startD && todayD <= endD);
    const isPast    = (todayD > endD);
    const isFuture  = (todayD < startD);

    let dayInCycle, daysLeft;
    if (isCurrent) {
      dayInCycle = Math.round((todayD - startD) / 86400000) + 1;
      daysLeft   = totalDays - dayInCycle + 1;
    } else if (isPast) {
      dayInCycle = totalDays; daysLeft = 0;
    } else {
      dayInCycle = 0; daysLeft = totalDays;
    }
    return { startStr, endStr, totalDays, dayInCycle, daysLeft, isCurrent, isPast, isFuture };
  }

  async function loadData(cycle) {
    const [spend, settingsRows, aliasRows] = await Promise.all([
      sbGet(`metrics?select=id,date,value,unit,category,tags,note,source,source_ref,created_at&metric_type=eq.spend&date=gte.${cycle.startStr}&date=lte.${cycle.endStr}&order=date.desc`),
      sbGet(`settings?key=in.(monthly_budget_huf,eur_huf_rate,daily_spend_target_huf)`),
      sbGet(`merchant_aliases?select=raw,canonical`),
    ]);
    const settings = Object.fromEntries(settingsRows.map(r => [r.key, r.value]));
    const eurRate = +(settings.eur_huf_rate || 350);
    const pot = +(settings.monthly_budget_huf || 300000);
    const dailyTarget = +(settings.daily_spend_target_huf || 10000);
    const aliasMap = new Map(aliasRows.map(a => [a.raw, a.canonical]));

    const rows = spend.map(s => {
      const tags = s.tags || [];
      // Resolve canonical merchant: prefer existing note (already backfilled / hand-annotated),
      // fall back to alias lookup on source_ref, fall back to source_ref itself.
      let merchant = s.note;
      if (!merchant && s.source_ref) {
        merchant = aliasMap.get(s.source_ref) || s.source_ref;
      }
      if (!merchant) merchant = '(no merchant)';
      return {
        ...s,
        tags,
        merchant,
        huf: s.unit === 'EUR' ? Math.round(+s.value * eurRate) : +s.value,
        isRecurring: tags.includes('recurring'),
        isTravel:    tags.includes('travel'),
      };
    });
    return { rows, eurRate, pot, dailyTarget };
  }

  function renderCyclePicker(cycle) {
    const label = `${fmtMonthShort(cycle.startStr)} cycle (${fmtShortDate(cycle.startStr)} → ${fmtShortDate(cycle.endStr)})`;
    document.getElementById('cycleLabel').innerHTML = cycle.isCurrent
      ? `${escapeHtml(label)} <span class="current-badge">NOW</span>`
      : escapeHtml(label);
    // disable next when in current cycle (no peeking into future cycles with no data)
    document.getElementById('cycleNext').disabled = CYCLE_OFFSET >= 0;
  }

  function renderCycleCard(cycle, totals, pot) {
    const { discTotal } = totals;
    const remaining = pot - discTotal;
    const overPot = discTotal > pot;
    const pctOfPot = pot > 0 ? Math.round(discTotal / pot * 100) : 0;
    const barW = Math.min(pctOfPot, 100);
    const idealPace  = pot / cycle.totalDays;
    const denom = cycle.isCurrent ? cycle.dayInCycle : cycle.totalDays;
    const actualPace = denom > 0 ? discTotal / denom : 0;
    const perDayLeft = cycle.daysLeft > 0 ? remaining / cycle.daysLeft : 0;
    const todayMarkerPct = cycle.isCurrent
      ? Math.min(cycle.dayInCycle / cycle.totalDays * 100, 100)
      : null;

    document.getElementById('cycleWindow').textContent =
      `${fmtShortDate(cycle.startStr)} → ${fmtShortDate(cycle.endStr)}`;

    const dayLine = cycle.isCurrent
      ? `${cycle.dayInCycle} / ${cycle.totalDays}`
      : cycle.isPast ? 'cycle complete' : 'upcoming';

    const heroBlock = cycle.isCurrent ? `
      <div class="daily-hero">
        <div class="daily-hero-body">
          <div class="daily-hero-label">left to spend today</div>
          <div class="daily-hero-amount ${perDayLeft < 0 ? 'over' : ''}">
            ${perDayLeft < 0 ? '−' : ''}${fmtHUF(Math.abs(perDayLeft))}<span class="unit">/day · ${cycle.daysLeft}d left</span>
          </div>
        </div>
        <div class="daily-hero-pace">
          pace<br/>
          <span class="pace-actual">${fmtHUF(actualPace)}</span><br/>
          <span style="color:var(--text-faint)">vs ${fmtHUF(idealPace)} target</span>
        </div>
      </div>` : '';

    document.getElementById('cycleCard').innerHTML = `
      <div class="cycle-head">
        <span class="cycle-amount ${overPot ? 'over' : ''}">
          ${fmtHUF(discTotal)}<span class="unit">of ${(pot/1000).toFixed(0)}k</span>
        </span>
        <span class="cycle-pct ${overPot ? 'over' : ''}">${pctOfPot}%</span>
      </div>
      <div class="cycle-sub">discretionary spend this cycle</div>
      <div class="bar">
        <div class="bar-fill ${overPot ? 'over' : ''}" style="width:${barW}%"></div>
        ${todayMarkerPct !== null ? `<div class="bar-marker" style="left:${todayMarkerPct}%" title="today"></div>` : ''}
      </div>
      <div class="cycle-foot">
        <span><span class="label">day</span> <span class="value">${dayLine}</span></span>
        <span><span class="label">${overPot ? 'over by' : 'left in pot'}</span>
              <span class="value ${overPot ? 'over' : ''}">${fmtHUF(Math.abs(remaining))}</span></span>
      </div>
      ${heroBlock}
    `;
  }

  // Two-level accordion: category → merchant (grouped by canonical name) → individual txns
  function renderCategoryAccordion(containerId, items, totalLabelEl, tone) {
    const byCat = new Map();
    items.forEach(s => {
      if (!byCat.has(s.category)) byCat.set(s.category, []);
      byCat.get(s.category).push(s);
    });

    const cats = Array.from(byCat.entries()).map(([cat, txns]) => {
      const byMerchant = new Map();
      txns.forEach(t => {
        if (!byMerchant.has(t.merchant)) byMerchant.set(t.merchant, []);
        byMerchant.get(t.merchant).push(t);
      });
      const merchants = Array.from(byMerchant.entries())
        .map(([name, mt]) => ({
          name,
          total: mt.reduce((s, t) => s + t.huf, 0),
          txns: mt.sort((a, b) => b.date.localeCompare(a.date)),
        }))
        .sort((a, b) => b.total - a.total);
      return {
        cat,
        total: txns.reduce((s, t) => s + t.huf, 0),
        count: txns.length,
        merchants,
      };
    }).sort((a, b) => b.total - a.total);

    const grandTotal = cats.reduce((s, c) => s + c.total, 0);
    const max = cats.length > 0 ? cats[0].total : 0;
    if (totalLabelEl) totalLabelEl.textContent = fmtHUF(grandTotal);

    const container = document.getElementById(containerId);
    if (cats.length === 0) {
      container.innerHTML = '<div class="empty">nothing this cycle</div>';
      return;
    }

    container.innerHTML = cats.map(({ cat, total, count, merchants }) => {
      const barW = max > 0 ? Math.round(total / max * 100) : 0;
      const merBlocks = merchants.map(({ name, total: mTotal, txns: mTxns }) => {
        const single = mTxns.length === 1;
        const txnRows = mTxns.map(t => {
          const tagPills = [];
          if (t.isTravel)    tagPills.push('<span class="txn-tag travel">travel</span>');
          if (t.isRecurring) tagPills.push('<span class="txn-tag recur">recurring</span>');
          return `
            <div class="txn-row long-pressable" data-txn-id="${t.id}">
              <span class="txn-date">${fmtShortDate(t.date)}</span>
              <div class="txn-tags">${tagPills.join('')}</div>
              <span class="txn-amount">${fmtHUF(t.huf)}</span>
            </div>`;
        }).join('');
        return `
          <div class="mer-block ${single ? 'single-txn expanded' : ''}">
            <div class="mer-row ${single ? 'single-txn' : ''}">
              <span class="mer-chevron">▸</span>
              <div class="mer-body">
                <div class="mer-name">${escapeHtml(name)}</div>
                <div class="mer-sub">${mTxns.length} txn${mTxns.length === 1 ? '' : 's'}</div>
              </div>
              <span class="mer-amount ${tone}">${fmtHUF(mTotal)}</span>
            </div>
            <div class="mer-txns">${txnRows}</div>
          </div>`;
      }).join('');

      return `
        <div class="cat-block" data-cat="${escapeHtml(cat)}">
          <div class="cat-row">
            <span class="cat-chevron">▸</span>
            <div class="cat-body">
              <div class="cat-label">${escapeHtml(cat)}</div>
              <div class="cat-sub">${count} txn${count === 1 ? '' : 's'} · ${merchants.length} merchant${merchants.length === 1 ? '' : 's'}</div>
            </div>
            <div class="cat-bar-wrap">
              <div class="cat-bar-fill ${tone}" style="width:${barW}%"></div>
            </div>
            <span class="cat-amount">${fmtHUF(total)}</span>
          </div>
          <div class="cat-merchants">${merBlocks}</div>
        </div>`;
    }).join('');

    // wire toggles
    container.querySelectorAll('.cat-row').forEach(row => {
      row.addEventListener('click', e => {
        if (e.target.closest('.long-pressable.armed')) return;
        row.parentElement.classList.toggle('expanded');
      });
    });
    container.querySelectorAll('.mer-row:not(.single-txn)').forEach(row => {
      row.addEventListener('click', e => {
        if (e.target.closest('.long-pressable.armed')) return;
        row.parentElement.classList.toggle('expanded');
      });
    });
  }

  function renderRecurringList(items) {
    const container = document.getElementById('recurList');
    const labelEl = document.getElementById('recurTotalLabel');
    const total = items.reduce((s, t) => s + t.huf, 0);
    labelEl.textContent = fmtHUF(total);
    if (items.length === 0) {
      container.innerHTML = '<div class="empty">no recurring spend yet</div>';
      return;
    }
    const sorted = [...items].sort((a, b) => b.huf - a.huf);
    container.innerHTML = sorted.map(t => `
      <div class="recur-row long-pressable" data-txn-id="${t.id}">
        <div class="recur-body">
          <div class="recur-name">${escapeHtml(t.merchant)}</div>
          <div class="recur-sub">${fmtShortDate(t.date)} · ${escapeHtml(t.category)}</div>
        </div>
        <span class="recur-amount">${fmtHUF(t.huf)}</span>
      </div>
    `).join('');
  }

  async function loadAll() {
    const cycle = computeCycle(CYCLE_OFFSET);
    renderCyclePicker(cycle);
    document.getElementById('cycleCard').innerHTML = '<div class="loading">loading…</div>';
    document.getElementById('catList').innerHTML = '<div class="loading">loading…</div>';
    document.getElementById('travelList').innerHTML = '<div class="loading">loading…</div>';
    document.getElementById('recurList').innerHTML = '<div class="loading">loading…</div>';
    try {
      const { rows, pot } = await loadData(cycle);
      LOADED_ROWS = rows;

      const discRows   = rows.filter(r => !r.isRecurring && !r.isTravel);
      const travelRows = rows.filter(r => r.isTravel);
      const recurRows  = rows.filter(r => r.isRecurring);

      const discTotal = discRows.reduce((s, r) => s + r.huf, 0);

      renderCycleCard(cycle, { discTotal }, pot);
      renderCategoryAccordion('catList',    discRows,   document.getElementById('discTotal'),         'spend');
      renderCategoryAccordion('travelList', travelRows, document.getElementById('travelTotalLabel'),  'travel');
      renderRecurringList(recurRows);
    } catch (e) {
      console.error(e);
      document.getElementById('cycleCard').innerHTML =
        `<div class="error-msg">load failed: ${escapeHtml(e.message)}</div>`;
      document.getElementById('catList').innerHTML = '';
      document.getElementById('travelList').innerHTML = '';
      document.getElementById('recurList').innerHTML = '';
    }
  }

  document.getElementById('cyclePrev').addEventListener('click', () => {
    CYCLE_OFFSET -= 1;
    loadAll();
  });
  document.getElementById('cycleNext').addEventListener('click', () => {
    if (CYCLE_OFFSET < 0) {
      CYCLE_OFFSET += 1;
      loadAll();
    }
  });

  // ---- Toast ----
  function showToast(msg, opts = {}) {
    const t = document.getElementById('toast');
    t.className = 'toast';
    if (opts.error) t.classList.add('error');
    if (opts.action) {
      t.innerHTML = `
        <span class="toast-msg">${escapeHtml(msg)}</span>
        <button class="toast-action">${escapeHtml(opts.actionLabel || 'undo')}</button>`;
      t.querySelector('.toast-action').addEventListener('click', () => {
        if (opts.onAction) opts.onAction();
        hideToast();
      });
    } else {
      t.textContent = msg;
    }
    t.classList.add('show');
    if (window._toastTimer) clearTimeout(window._toastTimer);
    window._toastTimer = setTimeout(() => {
      hideToast();
      if (opts.onTimeout) opts.onTimeout();
    }, opts.duration || 2400);
  }
  function hideToast() {
    document.getElementById('toast').classList.remove('show');
    if (window._toastTimer) { clearTimeout(window._toastTimer); window._toastTimer = null; }
  }

  // ---- Long-press delete (txn rows + recur rows) ----
  let PENDING_DELETE = null;
  let pressState = null;
  let ARMED = null;
  const MOVE_THRESHOLD = 10;

  function getEventPos(e) {
    if (e.touches && e.touches[0]) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
    return { x: e.clientX, y: e.clientY };
  }

  function commitPendingDelete() {
    if (!PENDING_DELETE) return;
    const p = PENDING_DELETE;
    PENDING_DELETE = null;
    if (p.timer) clearTimeout(p.timer);
    if (p.committed) return;
    p.committed = true;
    sbDelete(`metrics?id=eq.${p.id}`).catch(err => {
      console.error('Delete failed:', err);
      showToast(`✕ delete failed: ${err.message}`, { error: true });
      loadAll();
    });
  }

  function startDelete(id) {
    if (PENDING_DELETE) commitPendingDelete();
    const row = LOADED_ROWS.find(r => r.id === id);
    if (!row) return;
    // optimistic: remove from view by reloading without that row
    LOADED_ROWS = LOADED_ROWS.filter(r => r.id !== id);
    renderFromCache();

    PENDING_DELETE = {
      id, row, committed: false,
      timer: setTimeout(() => commitPendingDelete(), UNDO_TIMEOUT_MS),
    };
    const label = (row.merchant || '').slice(0, 32);
    showToast(`deleted "${label}"`, {
      action: true, actionLabel: 'UNDO', duration: UNDO_TIMEOUT_MS,
      onAction: () => {
        if (!PENDING_DELETE || PENDING_DELETE.committed) return;
        clearTimeout(PENDING_DELETE.timer);
        LOADED_ROWS.push(PENDING_DELETE.row);
        PENDING_DELETE = null;
        renderFromCache();
      },
    });
  }

  // Re-render from LOADED_ROWS without refetching (used by optimistic delete)
  function renderFromCache() {
    const cycle = computeCycle(CYCLE_OFFSET);
    sbGet(`settings?key=in.(monthly_budget_huf,eur_huf_rate)`).then(settingsRows => {
      const settings = Object.fromEntries(settingsRows.map(r => [r.key, r.value]));
      const pot = +(settings.monthly_budget_huf || 300000);
      const discRows   = LOADED_ROWS.filter(r => !r.isRecurring && !r.isTravel);
      const travelRows = LOADED_ROWS.filter(r => r.isTravel);
      const recurRows  = LOADED_ROWS.filter(r => r.isRecurring);
      const discTotal = discRows.reduce((s, r) => s + r.huf, 0);
      renderCycleCard(cycle, { discTotal }, pot);
      renderCategoryAccordion('catList',    discRows,   document.getElementById('discTotal'),        'spend');
      renderCategoryAccordion('travelList', travelRows, document.getElementById('travelTotalLabel'), 'travel');
      renderRecurringList(recurRows);
    });
  }

  function armRow(el, id) {
    const row = LOADED_ROWS.find(r => r.id === id);
    if (!row) return;
    ARMED = { id, el, originalHTML: el.innerHTML };
    el.classList.add('armed');
    const label = (row.merchant || '').slice(0, 24);
    el.innerHTML = `
      <div class="action-bar">
        <span class="label">delete "${escapeHtml(label)}"?</span>
        <button class="action-btn delete">DELETE</button>
        <button class="action-btn cancel">CANCEL</button>
      </div>`;
  }
  function clearArmed() {
    if (!ARMED) return;
    ARMED = null;
    renderFromCache();
  }

  function startPress(e, item) {
    if (PENDING_DELETE) return;
    const id = +item.dataset.txnId;
    const pos = getEventPos(e);
    pressState = {
      item, id, fired: false,
      startX: pos.x, startY: pos.y,
      timer: setTimeout(() => {
        if (!pressState) return;
        pressState.fired = true;
        if (navigator.vibrate) navigator.vibrate(30);
        armRow(item, id);
        if (pressState.item) pressState.item.classList.remove('pressing');
      }, LONG_PRESS_MS),
    };
    item.classList.add('pressing');
  }
  function cancelPress() {
    if (!pressState) return;
    clearTimeout(pressState.timer);
    if (pressState.item) pressState.item.classList.remove('pressing');
    pressState = null;
  }

  document.addEventListener('pointerdown', e => {
    if (e.target.closest('.toast')) return;
    const target = e.target.closest('.long-pressable');
    if (!target) return;
    if (target.classList.contains('armed')) return;
    if (ARMED) {
      clearArmed();
      return;
    }
    startPress(e, target);
  });
  document.addEventListener('pointermove', e => {
    if (!pressState) return;
    const pos = getEventPos(e);
    const dx = pos.x - pressState.startX;
    const dy = pos.y - pressState.startY;
    if (Math.hypot(dx, dy) > MOVE_THRESHOLD) cancelPress();
  });
  document.addEventListener('pointerup', cancelPress);
  document.addEventListener('pointercancel', cancelPress);
  document.addEventListener('scroll', () => { if (ARMED) clearArmed(); }, true);
  document.addEventListener('contextmenu', e => {
    if (e.target.closest('.long-pressable')) e.preventDefault();
  });

  document.addEventListener('click', e => {
    if (!ARMED) return;
    if (e.target.classList.contains('delete')) {
      const { id } = ARMED;
      ARMED = null;
      startDelete(id);
      return;
    }
    if (e.target.classList.contains('cancel')) {
      clearArmed();
      return;
    }
  });

  window.addEventListener('beforeunload', () => {
    if (PENDING_DELETE && !PENDING_DELETE.committed) {
      try {
        fetch(`${REST}/metrics?id=eq.${PENDING_DELETE.id}`, {
          method: 'DELETE', headers: HEADERS, keepalive: true,
        });
      } catch (e) { /* ignore */ }
    }
  });

  loadAll();
</script>

</body>

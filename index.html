<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0d0d">
<title>Daily Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: #0d0d0d; color: #fff; font-family: 'DM Mono', monospace; overscroll-behavior: none; }
  body { display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; }
  ::-webkit-scrollbar { display: none; }

  /* Header */
  .header { padding: 48px 20px 16px; border-bottom: 1px solid #1e1e1e; display: flex; justify-content: space-between; align-items: flex-start; flex-shrink: 0; }
  .header-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
  .header-date { color: #555; font-size: 11px; margin-top: 3px; letter-spacing: 1px; }
  .view-toggle { display: flex; gap: 5px; }
  .view-btn { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1px; padding: 6px 11px; border-radius: 20px; border: none; cursor: pointer; transition: all 0.2s; }
  .view-btn.active { background: #fff; color: #000; }
  .view-btn.inactive { background: #1a1a1a; color: #555; }

  /* Cards */
  .cards { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 16px 16px 0; flex-shrink: 0; }
  .card { padding: 14px 8px; border-radius: 14px; text-align: center; cursor: pointer; transition: all 0.2s; border: 1px solid transparent; }
  .card svg { display: block; margin: 0 auto; }
  .card-icon-wrap { position: relative; width: 60px; height: 60px; margin: 0 auto 6px; }
  .card-icon-wrap svg { position: absolute; top: 0; left: 0; }
  .card-emoji { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .card-total { font-size: 14px; font-weight: 500; }
  .card-unit { font-size: 9px; color: #555; letter-spacing: 0.5px; margin-top: 1px; }

  /* Panel */
  .panel { margin: 14px 16px 0; padding: 18px; border-radius: 16px; flex-shrink: 0; }
  .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .panel-title { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 800; letter-spacing: 1px; }
  .panel-goal { font-size: 11px; color: #555; }

  /* Input row */
  .input-row { display: flex; gap: 7px; margin-bottom: 12px; }
  .input-row input { font-family: 'DM Mono', monospace; font-size: 14px; color: #fff; border-radius: 10px; background: #ffffff0a; border: 1px solid transparent; padding: 10px 11px; -webkit-appearance: none; }
  .input-row input:focus { outline: none; }
  .input-amt { width: 85px; }
  .input-label { flex: 1; }
  .add-btn { border: none; border-radius: 10px; font-size: 22px; font-weight: 700; cursor: pointer; padding: 0 16px; transition: transform 0.1s; line-height: 1; }
  .add-btn:active { transform: scale(0.93); }

  /* Entries */
  .entries { max-height: 170px; overflow-y: auto; }
  .entry { display: flex; align-items: center; padding: 7px 10px; border-radius: 8px; background: #ffffff08; margin-bottom: 5px; font-size: 12px; color: #ccc; gap: 8px; }
  .entry-time { color: #555; min-width: 38px; font-size: 11px; }
  .entry-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .entry-amt { font-weight: 700; color: #fff; }
  .entry-del { background: none; border: none; color: #ff444877; font-size: 18px; cursor: pointer; padding: 0 2px; line-height: 1; flex-shrink: 0; }
  .empty { color: #333; font-size: 12px; text-align: center; padding: 16px 0; }

  /* Quick add */
  .quick-section { padding: 12px 16px 0; flex-shrink: 0; }
  .quick-label { font-size: 10px; letter-spacing: 1px; color: #333; margin-bottom: 7px; }
  .quick-pills { display: flex; gap: 6px; flex-wrap: wrap; }
  .quick-pill { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 20px; color: #777; font-size: 11px; font-family: 'DM Mono', monospace; padding: 5px 11px; cursor: pointer; transition: background 0.15s; }
  .quick-pill:active { background: #252525; }

  /* History */
  .history { padding: 16px; overflow-y: auto; flex: 1; }
  .hist-label { font-size: 10px; letter-spacing: 1px; color: #555; margin-bottom: 12px; }
  .hist-day { padding: 13px 14px; border-radius: 12px; background: #111; border: 1px solid #1e1e1e; margin-bottom: 9px; }
  .hist-date { font-size: 10px; color: #555; letter-spacing: 0.5px; margin-bottom: 9px; }
  .hist-cols { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; text-align: center; }
  .hist-emoji { font-size: 10px; margin-bottom: 2px; }
  .hist-val { font-size: 14px; font-weight: 500; }
  .hist-unit { font-size: 9px; color: #444; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">DAILY TRACKER</div>
    <div class="header-date" id="headerDate"></div>
  </div>
  <div class="view-toggle">
    <button class="view-btn active" onclick="setView('today')">TODAY</button>
    <button class="view-btn inactive" onclick="setView('history')">HISTORY</button>
  </div>
</div>

<div id="todayView">
  <!-- Cards -->
  <div class="cards" id="cards"></div>

  <!-- Active panel -->
  <div class="panel" id="panel">
    <div class="panel-header">
      <span class="panel-title" id="panelTitle"></span>
      <span class="panel-goal" id="panelGoal"></span>
    </div>
    <div class="input-row">
      <input class="input-amt" id="inputAmt" type="number" inputmode="decimal" placeholder="Amount" onkeydown="if(event.key==='Enter')addEntry()">
      <input class="input-label" id="inputLbl" type="text" placeholder="Label (optional)" onkeydown="if(event.key==='Enter')addEntry()">
      <button class="add-btn" id="addBtn" onclick="addEntry()">+</button>
    </div>
    <div class="entries" id="entries"></div>
  </div>

  <!-- Quick add -->
  <div class="quick-section">
    <div class="quick-label">QUICK ADD</div>
    <div class="quick-pills" id="quickPills"></div>
  </div>
</div>

<div id="historyView" style="display:none; flex:1; overflow-y:auto;">
  <div class="history" id="historyContent"></div>
</div>

<script>
const CATS = {
  spend:    { label:'Spend',    unit:'HUF',  icon:'💰', color:'#f0a500', bg:'#1a1400', goal:10000 },
  calories: { label:'Calories', unit:'kcal', icon:'🔥', color:'#e05a2b', bg:'#180e08', goal:2200  },
  tobacco:  { label:'Tobacco',  unit:'pcs',  icon:'🚬', color:'#7eb8a0', bg:'#071210', goal:10    },
};
const QUICK = {
  spend:    [['☕','600'],['🍕','3500'],['🚇','450'],['🛒','5000'],['🍺','900']],
  calories: [['🥚','80'],['🍌','90'],['🍗','250'],['🥗','180'],['🍝','420'],['🍫','150']],
  tobacco:  [['🚬','1'],['🚬','2'],['🚬','3'],['💨','1']],
};

let activeTab = 'spend';
let currentView = 'today';

const todayKey = () => new Date().toISOString().slice(0,10);

function loadData() {
  try { return JSON.parse(localStorage.getItem('daily_tracker_v2') || '{}'); } catch { return {}; }
}
function saveData(d) {
  try { localStorage.setItem('daily_tracker_v2', JSON.stringify(d)); } catch {}
}
function todayData() {
  const d = loadData(); const k = todayKey();
  if (!d[k]) d[k] = {spend:[],calories:[],tobacco:[]};
  return d[k];
}
function total(cat) {
  return (todayData()[cat]||[]).reduce((s,e)=>s+e.amount,0);
}
function fmtNum(n) { return n%1===0 ? n : n.toFixed(1); }
function fmtDate(str) {
  return new Date(str+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'}).toUpperCase();
}
function nowTime() {
  return new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}

// Radial SVG
function radialSVG(val, max, color, size=60) {
  const r=(size-8)/2, circ=2*Math.PI*r, pct=Math.min(val/max,1), dash=pct*circ;
  const over=val>max, c=over?'#ff4444':color;
  return `<svg width="${size}" height="${size}" style="transform:rotate(-90deg)">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#ffffff10" stroke-width="5"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${c}" stroke-width="5"
      stroke-dasharray="${dash} ${circ}" stroke-linecap="round"
      style="transition:stroke-dasharray 0.4s ease"/>
  </svg>`;
}

function renderCards() {
  const el = document.getElementById('cards');
  el.innerHTML = Object.entries(CATS).map(([key,c])=>{
    const t=total(key), over=t>c.goal, active=key===activeTab;
    const col = over?'#ff4444':c.color;
    return `<div class="card" onclick="setTab('${key}')" style="background:${active?c.bg:'#111'};border-color:${active?c.color+'44':'#1e1e1e'}">
      <div class="card-icon-wrap">${radialSVG(t,c.goal,c.color)}<div class="card-emoji">${c.icon}</div></div>
      <div class="card-total" style="color:${col}">${fmtNum(t)}</div>
      <div class="card-unit">${c.unit} / ${c.goal}</div>
    </div>`;
  }).join('');
}

function renderPanel() {
  const c = CATS[activeTab];
  const t = total(activeTab);
  const over = t > c.goal;
  document.getElementById('panel').style.background = c.bg;
  document.getElementById('panel').style.border = `1px solid ${c.color}22`;
  document.getElementById('panelTitle').textContent = `${c.icon} ${c.label.toUpperCase()}`;
  document.getElementById('panelTitle').style.color = c.color;
  document.getElementById('panelGoal').textContent = `${fmtNum(t)} / ${c.goal} ${c.unit}`;
  document.getElementById('inputAmt').style.borderColor = c.color+'33';
  document.getElementById('inputLbl').style.borderColor = c.color+'33';
  document.getElementById('addBtn').style.background = c.color;
  document.getElementById('addBtn').style.color = over?'#fff':'#000';

  const entries = [...(todayData()[activeTab]||[])].reverse();
  const el = document.getElementById('entries');
  if (!entries.length) {
    el.innerHTML = '<div class="empty">No entries yet today</div>';
  } else {
    el.innerHTML = entries.map(e=>`
      <div class="entry">
        <span class="entry-time">${e.time}</span>
        <span class="entry-label">${e.label||'—'}</span>
        <span class="entry-amt">${fmtNum(e.amount)}</span>
        <button class="entry-del" onclick="deleteEntry('${activeTab}',${e.id})">×</button>
      </div>`).join('');
  }
}

function renderQuick() {
  const c = CATS[activeTab];
  const pills = QUICK[activeTab];
  document.getElementById('quickPills').innerHTML = pills.map(([emoji,amt])=>
    `<button class="quick-pill" onclick="quickAdd('${amt}','${emoji}')">${emoji} ${fmtNum(parseFloat(amt))}</button>`
  ).join('');
}

function render() {
  // Header date
  document.getElementById('headerDate').textContent = fmtDate(todayKey());
  renderCards();
  renderPanel();
  renderQuick();
}

function setTab(tab) {
  activeTab = tab;
  document.getElementById('inputAmt').value = '';
  document.getElementById('inputLbl').value = '';
  render();
}

function setView(v) {
  currentView = v;
  document.getElementById('todayView').style.display = v==='today'?'block':'none';
  document.getElementById('historyView').style.display = v==='history'?'block':'none';
  document.querySelectorAll('.view-btn').forEach((b,i)=>{
    b.className = 'view-btn ' + (['today','history'][i]===v?'active':'inactive');
  });
  if (v==='history') renderHistory();
}

function renderHistory() {
  const data = loadData();
  const days = Object.keys(data).sort((a,b)=>b.localeCompare(a)).slice(0,14);
  const el = document.getElementById('historyContent');
  if (!days.length) { el.innerHTML='<div class="empty" style="padding:40px 0">No history yet</div>'; return; }
  el.innerHTML = '<div class="hist-label">LAST 14 DAYS</div>' + days.map(day=>{
    const d = data[day]||{};
    const isToday = day===todayKey();
    const cols = Object.entries(CATS).map(([key,c])=>{
      const t=(d[key]||[]).reduce((s,e)=>s+e.amount,0);
      const col=t>c.goal?'#ff4444':t>0?c.color:'#333';
      return `<div><div class="hist-emoji">${c.icon}</div>
        <div class="hist-val" style="color:${col}">${fmtNum(t)}</div>
        <div class="hist-unit">${c.unit}</div></div>`;
    }).join('');
    return `<div class="hist-day">
      <div class="hist-date">${fmtDate(day)}${isToday?' · TODAY':''}</div>
      <div class="hist-cols">${cols}</div>
    </div>`;
  }).join('');
}

function addEntry() {
  const amt = parseFloat(document.getElementById('inputAmt').value);
  if (!amt || isNaN(amt)) return;
  const lbl = document.getElementById('inputLbl').value.trim();
  const data = loadData(); const k = todayKey();
  if (!data[k]) data[k]={spend:[],calories:[],tobacco:[]};
  data[k][activeTab].push({ id:Date.now(), amount:amt, label:lbl, time:nowTime() });
  saveData(data);
  document.getElementById('inputAmt').value='';
  document.getElementById('inputLbl').value='';
  render();
}

function quickAdd(amt, emoji) {
  const data = loadData(); const k = todayKey();
  if (!data[k]) data[k]={spend:[],calories:[],tobacco:[]};
  data[k][activeTab].push({ id:Date.now(), amount:parseFloat(amt), label:emoji, time:nowTime() });
  saveData(data);
  render();
}

function deleteEntry(cat, id) {
  const data = loadData(); const k = todayKey();
  if (!data[k]||!data[k][cat]) return;
  data[k][cat] = data[k][cat].filter(e=>e.id!==id);
  saveData(data);
  render();
}

render();
</script>
</body>
</html>

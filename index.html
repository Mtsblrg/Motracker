<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0a">
  <title>Motracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Motracker <span id="connStatus" class="conn-status" title="Supabase connection">⚪</span></h1>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="capture">📥 Capture</button>
    <button class="tab" data-tab="today">📅 Today</button>
    <button class="tab" data-tab="history">📊 History</button>
    <button class="tab" data-tab="settings">⚙️ Settings</button>
  </nav>

  <main>
    <section id="tab-capture" class="tab-panel active">
      <h2>Capture</h2>
      <p class="placeholder">Single input + AI routing. Built in next chat.</p>
    </section>

    <section id="tab-today" class="tab-panel">
      <h2>Today</h2>
      <p class="placeholder">Tasks, shopping, notes, metrics, reminders.</p>
    </section>

    <section id="tab-history" class="tab-panel">
      <h2>History</h2>
      <p class="placeholder">Archive + trend graphs vs target.</p>
    </section>

    <section id="tab-settings" class="tab-panel">
      <h2>Settings</h2>
      <div id="settingsList" class="settings-list">
        <p class="placeholder">Loading…</p>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>

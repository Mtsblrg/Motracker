<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0d0f12" />
<title>Motracker — today</title>
<style>
  :root {
    --bg: #0d0f12;
    --surface: #161a20;
    --surface-hover: #1c2026;
    --border: #22262c;
    --border-strong: #2a2d33;
    --text: #e8e8e8;
    --text-dim: #a8acb4;
    --text-faint: #6a6e76;
    --accent: #c4f060;
    --accent-dim: #9bb84c;
    --spend: #f0a955;
    --spend-dim: #ba7517;
    --danger: #f0796e;
    --danger-bg: rgba(240, 121, 110, 0.15);
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--bg); }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    color: var(--text);
    padding: 16px 16px 80px;
    max-width: 460px;
    margin: 0 auto;
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
  }

  header {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 18px; padding: 4px 4px 0;
  }
  header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.5px; color: var(--accent); }
  .header-right { display: flex; align-items: baseline; gap: 14px; }
  .header-right .date { font-size: 13px; color: var(--text-dim); letter-spacing: 0.3px; }
  .header-right .nav { font-size: 13px; color: var(--text-faint); text-decoration: none; }
  .header-right .nav:hover { color: var(--accent); }

  .capture {
    background: var(--surface); border: 1px solid var(--border-strong);
    border-radius: var(--radius); padding: 12px 14px; margin-bottom: 18px;
    transition: border-color 0.15s;
  }
  .capture:focus-within { border-color: var(--accent); }
  .capture textarea {
    width: 100%; border: none; background: transparent; color: var(--text);
    font-family: inherit; font-size: 15px; line-height: 1.5; resize: none;
    outline: none; min-height: 22px; max-height: 200px; overflow-y: auto;
  }
  .capture textarea::placeholder { color: var(--text-faint); }
  .capture-bar {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 10px; height: 0; overflow: hidden; transition: height 0.2s;
  }
  .capture:focus-within .capture-bar,
  .capture.has-text .capture-bar { height: 32px; }
  .capture-bar .hint { font-size: 12px; color: var(--text-faint); }
  .capture-bar button {
    background: var(--accent); color: var(--bg); border: none; border-radius: 8px;
    padding: 6px 14px; font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .capture-bar button:disabled {
    background: var(--border-strong); color: var(--text-faint); cursor: not-allowed;
  }

  section { margin-bottom: 18px; }
  .section-head {
    display: flex; align-items: baseline; justify-content: space-between; padding: 0 4px 8px;
    cursor: default;
    -webkit-user-select: none; user-select: none;
  }
  .section-head.collapsible { cursor: pointer; }
  .section-head h2 {
    font-size: 11px; font-weight: 600; letter-spacing: 2px;
    text-transform: uppercase; color: var(--text-dim);
  }
  .section-head .count { font-size: 12px; color: var(--text-faint); }
  .section-head .chevron {
    font-size: 12px; color: var(--text-faint);
    transition: transform 0.2s; display: inline-block;
  }
  .section-head .chevron.open { transform: rotate(180deg); }

  .list {
    background: var(--surface); border: 1px solid var(--border-strong);
    border-radius: var(--radius); overflow: hidden;
  }
  .list-item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 14px 16px; border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s, transform 0.5s ease-out, border-color 0.5s ease-out;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none;
    position: relative;
  }
  .list-item:last-child { border-bottom: none; }
  .list-item:active { background: var(--surface-hover); }
  .list-item.optimistic { opacity: 0.55; }

  /* shared long-press visual states */
  .long-pressable {
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none;
    position: relative;
  }
  .long-pressable.pressing {
    background: var(--danger-bg);
    transform: scale(0.98);
    transition: background 0.5s ease-out, transform 0.5s ease-out;
  }
  .long-pressable.armed { background: var(--danger-bg); }
  .long-pressable.armed:active { background: var(--danger-bg); }

  .delete-confirm-bar { display: flex; align-items: center; gap: 12px; width: 100%; }
  .delete-confirm-text { flex: 1; font-size: 14px; color: var(--text-dim); }
  .delete-confirm-delete {
    background: var(--danger); color: #fff; border: none;
    padding: 6px 16px; border-radius: 6px; font-size: 13px; font-weight: 600;
    cursor: pointer; letter-spacing: 0.3px;
  }
  .delete-confirm-cancel {
    background: transparent; color: var(--text-dim);
    border: 1px solid var(--border-strong);
    padding: 6px 14px; border-radius: 6px; font-size: 13px;
    cursor: pointer;
  }
  .food-entry .delete-confirm-text,
  .spend-entry .delete-confirm-text { font-size: 13px; }
  .food-entry .delete-confirm-delete,
  .spend-entry .delete-confirm-delete { padding: 5px 12px; font-size: 12px; }
  .food-entry .delete-confirm-cancel,
  .spend-entry .delete-confirm-cancel { padding: 5px 10px; font-size: 12px; }

  .checkbox {
    width: 20px; height: 20px; border: 1.5px solid var(--text-faint);
    border-radius: 6px; flex-shrink: 0; margin-top: 1px;
    display: flex; align-items: center; justify-content: center; transition: all 0.15s;
  }
  .list-item.done .checkbox { background: var(--accent); border-color: var(--accent); }
  .list-item.done .checkbox::after {
    content: "✓"; color: var(--bg); font-size: 14px; font-weight: 700; line-height: 1;
  }
  .item-body { flex: 1; min-width: 0; }
  .item-text { font-size: 15px; line-height: 1.4; word-wrap: break-word; }
  .item-meta {
    display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px;
    font-size: 12px; color: var(--text-dim); align-items: center;
  }
  .item-meta:empty { display: none; }
  .deadline { color: var(--accent-dim); font-weight: 500; padding: 2px 4px; }
  .deadline.overdue { color: var(--danger); }
  .age { color: var(--text-faint); font-style: italic; padding: 2px 4px; }

  .tag {
    padding: 2px 8px; border-radius: 10px;
    font-size: 11px; font-weight: 500; letter-spacing: 0.2px;
    border: 1px solid transparent;
  }
  .tag-work     { background: rgba(55, 138, 221, 0.12); color: #85b7eb; border-color: rgba(55, 138, 221, 0.25); }
  .tag-health   { background: rgba(99, 153, 34, 0.12);  color: #c0dd97; border-color: rgba(99, 153, 34, 0.25); }
  .tag-finance  { background: rgba(186, 117, 23, 0.12); color: #f0a955; border-color: rgba(186, 117, 23, 0.3); }
  .tag-mhc      { background: rgba(216, 90, 48, 0.12);  color: #f0997b; border-color: rgba(216, 90, 48, 0.3); }
  .tag-urgent   { background: rgba(226, 75, 74, 0.15);  color: #f09595; border-color: rgba(226, 75, 74, 0.35); }
  .tag-personal { background: rgba(29, 158, 117, 0.12); color: #5dcaa5; border-color: rgba(29, 158, 117, 0.25); }
  .tag-growth   { background: rgba(127, 119, 221, 0.15); color: #afa9ec; border-color: rgba(127, 119, 221, 0.3); }
  .tag-fusi     { background: rgba(212, 83, 126, 0.12); color: #ed93b1; border-color: rgba(212, 83, 126, 0.3); }
  .tag-default  { background: var(--border); color: var(--text-dim); border-color: var(--border-strong); }

  .route {
    font-size: 10px; padding: 2px 8px; border-radius: 10px;
    font-weight: 500; letter-spacing: 0.3px;
    border: 1px solid transparent; white-space: nowrap; flex-shrink: 0;
  }
  .route-tasks    { background: rgba(55, 138, 221, 0.12); color: #85b7eb; border-color: rgba(55, 138, 221, 0.25); }
  .route-shopping { background: rgba(29, 158, 117, 0.12); color: #5dcaa5; border-color: rgba(29, 158, 117, 0.25); }
  .route-calories { background: rgba(196, 240, 96, 0.12); color: #c4f060; border-color: rgba(196, 240, 96, 0.25); }
  .route-spend    { background: rgba(186, 117, 23, 0.12); color: #f0a955; border-color: rgba(186, 117, 23, 0.3); }
  .route-tobacco  { background: rgba(216, 90, 48, 0.12); color: #f0997b; border-color: rgba(216, 90, 48, 0.3); }
  .route-metric   { background: rgba(168, 172, 180, 0.12); color: var(--text-dim); border-color: var(--border-strong); }
  .route-note     { background: rgba(127, 119, 221, 0.15); color: #afa9ec; border-color: rgba(127, 119, 221, 0.3); }
  .route-reminder { background: rgba(212, 83, 126, 0.12); color: #ed93b1; border-color: rgba(212, 83, 126, 0.3); }
  .route-entry    { background: var(--border); color: var(--text-faint); border-color: var(--border-strong); }
  .route-multi    { background: rgba(168, 172, 180, 0.12); color: var(--text-dim); border-color: var(--border-strong); }

  .source {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 8px 3px 6px;
    border-radius: 10px;
    font-size: 11px; font-weight: 500; letter-spacing: 0.3px;
    border: 1px solid var(--border-strong);
    background: transparent; color: var(--text-dim);
    flex-shrink: 0; margin-top: 1px; white-space: nowrap;
  }
  .source-icon { font-size: 11px; line-height: 1; }
  .source-capture  .source-icon { color: var(--accent); }
  .source-gcal     .source-icon { color: #85b7eb; }
  .source-bank     .source-icon { color: #f0a955; }
  .source-chat     .source-icon { color: #afa9ec; }
  .source-gmail    .source-icon { color: #f09595; }
  .source-manual   .source-icon { color: var(--text-dim); }
  .source-revolut  .source-icon { color: #afa9ec; }
  .source-erste    .source-icon { color: #f0a955; }

  .list-item.done .item-text {
    color: var(--text-faint); text-decoration: line-through; text-decoration-color: var(--text-faint);
  }
  .list-item.done .item-meta { opacity: 0.5; }
  .list-item.done .source { opacity: 0.45; }

  .empty {
    padding: 18px 16px; text-align: center; font-size: 13px;
    color: var(--text-faint); font-style: italic;
  }
  .loading {
    padding: 18px 16px; text-align: center; font-size: 13px;
    color: var(--text-faint);
  }
  .error-msg {
    padding: 14px 16px; font-size: 13px; color: var(--danger);
    background: rgba(240, 121, 110, 0.08); border: 1px solid rgba(240, 121, 110, 0.25);
    border-radius: var(--radius);
  }

  .metric {
    background: var(--surface); border: 1px solid var(--border-strong);
    border-radius: var(--radius); padding: 16px;
  }
  .metric-head {
    display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px;
  }
  .metric-current {
    font-size: 22px; font-weight: 600; color: var(--text);
    letter-spacing: -0.3px; font-variant-numeric: tabular-nums;
  }
  .metric-current .unit {
    font-size: 13px; font-weight: 400; color: var(--text-dim);
    margin-left: 4px; letter-spacing: 0;
  }
  .metric-pct {
    font-size: 15px; font-weight: 600; color: var(--accent);
    font-variant-numeric: tabular-nums;
  }
  .metric-pct.spend-color { color: var(--spend); }
  .metric-pct.over { color: var(--danger); }
  .bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; position: relative; }
  .bar-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.4s ease-out; }
  .bar-fill.spend-color { background: var(--spend); }
  .bar-fill.over { background: var(--danger); }
  .metric-foot {
    margin-top: 10px; font-size: 13px; color: var(--text-dim);
    display: flex; justify-content: space-between;
    font-variant-numeric: tabular-nums;
  }
  .metric-foot .goal-value { color: var(--text); font-weight: 500; }
  .metric-foot .remaining { color: var(--accent-dim); font-weight: 500; }
  .metric-foot .remaining.spend-color { color: var(--spend-dim); }
  .metric-foot .remaining.over { color: var(--danger); }

  .metric-detail {
    margin-top: 14px; padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .metric-detail-toggle {
    display: flex; justify-content: space-between; align-items: center;
    cursor: pointer; user-select: none; -webkit-user-select: none;
  }
  .metric-detail-toggle .label {
    font-size: 12px; color: var(--text-dim); letter-spacing: 0.5px;
  }
  .metric-detail-toggle .chevron {
    font-size: 13px; color: var(--text-faint);
    transition: transform 0.2s;
  }
  .metric-detail-toggle .chevron.open { transform: rotate(180deg); }
  .metric-detail-body {
    margin-top: 10px; display: flex; flex-direction: column; gap: 8px;
  }
  .metric-detail-body.hidden { display: none; }

  .food-entry {
    padding: 8px 10px;
    background: rgba(196, 240, 96, 0.04);
    border: 1px solid rgba(196, 240, 96, 0.12);
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.1s, transform 0.5s ease-out;
  }
  .food-entry:active { background: rgba(196, 240, 96, 0.08); }
  .food-entry-head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 4px;
  }
  .food-entry-time { font-size: 12px; color: var(--text-faint); }
  .food-entry-kcal { font-size: 12px; color: var(--accent); font-weight: 500; }
  .food-entry-note {
    font-size: 13px; color: var(--text); line-height: 1.4;
    word-wrap: break-word;
  }

  .spend-entry {
    padding: 8px 10px;
    background: rgba(240, 169, 85, 0.04);
    border: 1px solid rgba(240, 169, 85, 0.12);
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.1s, transform 0.5s ease-out;
  }
  .spend-entry:active { background: rgba(240, 169, 85, 0.08); }
  .spend-entry-head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 4px;
  }
  .spend-entry-time { font-size: 12px; color: var(--text-faint); }
  .spend-entry-amount { font-size: 12px; color: var(--spend); font-weight: 500; }
  .spend-entry-merchant {
    font-size: 13px; color: var(--text); line-height: 1.4;
    word-wrap: break-word;
  }
  .spend-entry-source {
    display: inline-block;
    font-size: 10px; padding: 1px 6px;
    border-radius: 8px; margin-left: 6px;
    border: 1px solid var(--border-strong);
    color: var(--text-faint);
    vertical-align: middle;
  }
  .spend-entry-source.src-revolut { color: #afa9ec; border-color: rgba(127, 119, 221, 0.3); }
  .spend-entry-source.src-erste   { color: #f0a955; border-color: rgba(186, 117, 23, 0.3); }

  /* captures list (TODAY) */
  .captures-list { background: var(--surface); border: 1px solid var(--border-strong); border-radius: var(--radius); overflow: hidden; }
  .captures-list.hidden { display: none; }
  .capture-row {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: baseline; gap: 10px;
  }
  .capture-row:last-child { border-bottom: none; }
  .capture-row-body { flex: 1; min-width: 0; }
  .capture-row-text {
    font-size: 13px; line-height: 1.4;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .capture-row-meta {
    font-size: 11px; color: var(--text-faint); margin-top: 2px;
  }

  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--accent); color: var(--bg);
    padding: 12px 20px; border-radius: 12px;
    font-size: 14px; font-weight: 500;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    opacity: 0; transition: all 0.3s ease-out;
    z-index: 100; max-width: 360px; text-align: center;
    display: flex; align-items: center; gap: 14px;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--danger); color: #fff; }
  .toast.action {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border-strong);
    padding: 10px 8px 10px 18px;
  }
  .toast .toast-msg { flex: 1; text-align: left; }
  .toast .toast-action {
    background: transparent;
    color: var(--accent);
    border: none;
    padding: 6px 12px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border-radius: 8px;
    letter-spacing: 0.5px;
  }
  .toast .toast-action:active { background: rgba(196, 240, 96, 0.1); }
  .toast .toast-progress {
    position: absolute;
    bottom: 0; left: 0;
    height: 2px;
    background: var(--accent);
    border-radius: 0 0 12px 12px;
    width: 100%;
    transform-origin: left;
  }
</style>
</head>
<body>

<header>
  <h1>motracker</h1>
  <div class="header-right">
    <span class="date" id="date">—</span>
    <a class="nav" href="./spend.html">spend →</a>
    <a class="nav" href="./capture.html">captures →</a>
  </div>
</header>

<div class="capture" id="capture">
  <textarea id="captureInput" rows="1" placeholder="capture anything..."></textarea>
  <div class="capture-bar">
    <span class="hint">enter to send · shift+enter for newline</span>
    <button id="captureBtn" disabled>send</button>
  </div>
</div>

<section>
  <div class="section-head">
    <h2>tasks</h2>
    <span class="count" id="tasksCount"></span>
  </div>
  <div class="list" id="tasksList">
    <div class="loading">loading…</div>
  </div>
</section>

<section>
  <div class="section-head">
    <h2>shopping</h2>
    <span class="count" id="shoppingCount"></span>
  </div>
  <div class="list" id="shoppingList">
    <div class="loading">loading…</div>
  </div>
</section>

<section>
  <div class="section-head"><h2>calories</h2></div>
  <div class="metric" id="caloriesMetric">
    <div class="loading">loading…</div>
  </div>
</section>

<section>
  <div class="section-head collapsible" id="capturesHead">
    <h2>recent captures</h2>
    <span class="count" id="capturesCount"><span class="chevron" id="capturesChevron">▾</span></span>
  </div>
  <div class="captures-list hidden" id="capturesList">
    <div class="loading">loading…</div>
  </div>
</section>

<section>
  <div class="section-head"><h2>spend</h2></div>
  <div class="metric" id="spendMetric">
    <div class="loading">loading…</div>
  </div>
</section>

<div class="toast" id="toast"></div>

<script>
  // ============================================
  // CONFIG
  // ============================================
  const SUPABASE_URL = "https://fwqhomgawlgicqiqqqhw.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ3cWhvbWdhd2xnaWNxaXFxcWh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMTE1NDYsImV4cCI6MjA5Mjc4NzU0Nn0.LF82rWM0rX5FKY0Qo5Vsym_VWgV2reL_U8LkHbfWVHI";
  const CAPTURE_FN_URL = `${SUPABASE_URL}/functions/v1/capture`;
  const REST = `${SUPABASE_URL}/rest/v1`;

  const HEADERS = {
    "apikey": SUPABASE_ANON_KEY,
    "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
    "Content-Type": "application/json",
  };

  const TAG_CLASSES = {
    work: 'tag-work', mhc: 'tag-mhc', health: 'tag-health', finance: 'tag-finance',
    urgent: 'tag-urgent', personal: 'tag-personal', growth: 'tag-growth', fusi: 'tag-fusi',
  };

  const SOURCES = {
    capture: { icon: '✎', label: 'capture' },
    gcal:    { icon: '◰', label: 'gcal'    },
    bank:    { icon: '€', label: 'bank'    },
    chat:    { icon: '◇', label: 'chat'    },
    gmail:   { icon: '✉', label: 'gmail'   },
    manual:  { icon: '•', label: 'manual'  },
    revolut: { icon: '€', label: 'revolut' },
    erste:   { icon: '€', label: 'erste'   },
  };

  const LONG_PRESS_MS = 500;
  const UNDO_TIMEOUT_MS = 5000;

  function todayISO() {
    // Use Intl for DST-safe Budapest local date
    const fmt = new Intl.DateTimeFormat('en-CA', {
      timeZone: 'Europe/Budapest',
      year: 'numeric', month: '2-digit', day: '2-digit',
    });
    return fmt.format(new Date());
  }
  const TODAY = todayISO();

  // ============================================
  // STATE
  // ============================================
  let TASKS = [];
  let SHOPPING = [];
  let CALORIES_TODAY = 0;
  let SPEND_TODAY = 0;
  let FOOD_ENTRIES = []; // [{id, created_at, value, note}]
  let SPEND_ENTRIES = []; // [{id, created_at, value, note(merchant), source}]
  let RECENT_CAPTURES = []; // grouped { entry, routes:[{table, route_label}] }
  let GOALS = { calories: 2500, spend: 10000 };

  let CAPTURES_OPEN = false;
  let FOOD_OPEN = false;
  let SPEND_OPEN = false;

  // ============================================
  // DELETABLE REGISTRY
  // ============================================
  const DELETABLES = {
    tasks: {
      array: () => TASKS,
      render: () => renderTasks(),
      label:  row => row.text,
    },
    shopping: {
      array: () => SHOPPING,
      render: () => renderShopping(),
      label:  row => row.item,
    },
    metrics_calories: {
      table: 'metrics',
      array: () => FOOD_ENTRIES,
      render: () => renderCaloriesMetric(),
      label:  row => row.note || '(no description)',
      afterRemove:  row => { CALORIES_TODAY -= +row.value; },
      afterRestore: row => { CALORIES_TODAY += +row.value; },
    },
    metrics_spend: {
      table: 'metrics',
      array: () => SPEND_ENTRIES,
      render: () => renderSpendMetric(),
      label:  row => row.note || '(no merchant)',
      afterRemove:  row => { SPEND_TODAY -= +row.value; },
      afterRestore: row => { SPEND_TODAY += +row.value; },
    },
  };

  // ============================================
  // REST HELPERS
  // ============================================
  async function sbGet(path) {
    const res = await fetch(`${REST}/${path}`, { headers: HEADERS });
    if (!res.ok) throw new Error(`GET ${path}: ${res.status}`);
    return res.json();
  }

  async function sbPatch(path, body) {
    const res = await fetch(`${REST}/${path}`, {
      method: "PATCH",
      headers: { ...HEADERS, "Prefer": "return=representation" },
      body: JSON.stringify(body),
    });
    if (!res.ok) {
      const t = await res.text();
      throw new Error(`PATCH ${path}: ${res.status} ${t}`);
    }
    return res.json();
  }

  async function sbDelete(path) {
    const res = await fetch(`${REST}/${path}`, {
      method: "DELETE",
      headers: HEADERS,
    });
    if (!res.ok) {
      const t = await res.text();
      throw new Error(`DELETE ${path}: ${res.status} ${t}`);
    }
    return true;
  }

  // ============================================
  // FETCH
  // ============================================
  async function loadGoals() {
    try {
      const rows = await sbGet(`settings?key=in.(daily_calorie_target,daily_spend_target_huf)`);
      rows.forEach(r => {
        if (r.key === "daily_calorie_target")     GOALS.calories = +r.value;
        if (r.key === "daily_spend_target_huf")   GOALS.spend    = +r.value;
      });
    } catch (e) {
      console.warn("Failed to load goals, using defaults:", e);
    }
  }

  async function loadTasks() {
    const url = `tasks?or=(done.eq.false,and(done.eq.true,done_at.gte.${TODAY}T00:00:00))&select=*&order=created_at.desc`;
    TASKS = await sbGet(url);
  }

  async function loadShopping() {
    const url = `shopping?or=(done.eq.false,and(done.eq.true,done_at.gte.${TODAY}T00:00:00))&select=*&order=created_at.desc`;
    SHOPPING = await sbGet(url);
  }

  async function loadMetrics() {
    const url = `metrics?date=eq.${TODAY}&metric_type=in.(calories,spend)&select=id,metric_type,value,note,source,created_at&order=created_at.desc`;
    const rows = await sbGet(url);
    CALORIES_TODAY = rows.filter(r => r.metric_type === "calories").reduce((s, r) => s + +r.value, 0);
    SPEND_TODAY    = rows.filter(r => r.metric_type === "spend").reduce((s, r) => s + +r.value, 0);
    FOOD_ENTRIES   = rows.filter(r => r.metric_type === "calories")
                         .map(r => ({ id: r.id, created_at: r.created_at, value: +r.value, note: r.note }));
    SPEND_ENTRIES  = rows.filter(r => r.metric_type === "spend")
                         .map(r => ({ id: r.id, created_at: r.created_at, value: +r.value, note: r.note, source: r.source }));
  }

  async function loadRecentCaptures() {
    const todayStart = `${TODAY}T00:00:00`;
    const todayEnd   = `${TODAY}T23:59:59`;
    const entries = await sbGet(
      `entries?created_at=gte.${todayStart}&created_at=lte.${todayEnd}&select=*&order=created_at.desc`
    );
    if (entries.length === 0) { RECENT_CAPTURES = []; return; }

    const entryIds = entries.map(e => e.id);
    const idFilter = `entry_id=in.(${entryIds.join(',')})`;

    const [tasksRows, shoppingRows, notesRows, remindersRows, metricsRows] = await Promise.all([
      sbGet(`tasks?${idFilter}&select=entry_id`),
      sbGet(`shopping?${idFilter}&select=entry_id`),
      sbGet(`notes?${idFilter}&select=entry_id`),
      sbGet(`reminders?${idFilter}&select=entry_id`),
      sbGet(`metrics?${idFilter}&select=entry_id,metric_type`),
    ]);

    const routesByEntry = new Map();
    function add(entryId, label) {
      if (!routesByEntry.has(entryId)) routesByEntry.set(entryId, new Set());
      routesByEntry.get(entryId).add(label);
    }
    tasksRows.forEach(r => add(r.entry_id, 'tasks'));
    shoppingRows.forEach(r => add(r.entry_id, 'shopping'));
    notesRows.forEach(r => add(r.entry_id, 'note'));
    remindersRows.forEach(r => add(r.entry_id, 'reminder'));
    metricsRows.forEach(r => add(r.entry_id, r.metric_type));

    RECENT_CAPTURES = entries.map(e => {
      const labels = routesByEntry.has(e.id) ? Array.from(routesByEntry.get(e.id)) : [];
      return {
        entry: e,
        routes: labels.map(label => ({ label })),
      };
    });
  }

  async function loadAll() {
    try {
      await Promise.all([
        loadGoals(),
        loadTasks(),
        loadShopping(),
        loadMetrics(),
        loadRecentCaptures(),
      ]);
      renderAll();
    } catch (e) {
      console.error(e);
      document.getElementById("tasksList").innerHTML =
        `<div class="error-msg">load failed: ${escapeHtml(e.message)}</div>`;
      document.getElementById("shoppingList").innerHTML = "";
      document.getElementById("caloriesMetric").innerHTML = "";
      document.getElementById("spendMetric").innerHTML = "";
      document.getElementById("capturesList").innerHTML = "";
    }
  }

  // ============================================
  // HELPERS
  // ============================================
  function escapeHtml(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[c]));
  }

  function fmtShortDate(iso) {
    const d = new Date(iso + (iso.length === 10 ? 'T00:00:00' : ''));
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }).toLowerCase();
  }

  function fmtTime(iso) {
    const d = new Date(iso);
    return d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', timeZone: 'Europe/Budapest' });
  }

  function fmtDeadline(iso) {
    if (!iso) return null;
    const today = new Date(TODAY + 'T00:00:00');
    const d = new Date(iso + 'T00:00:00');
    const diff = Math.round((d - today) / 86400000);
    const date = fmtShortDate(iso);
    if (diff < 0)  return { text: `${Math.abs(diff)}d overdue (${date})`, overdue: true };
    if (diff === 0) return { text: `today (${date})`, overdue: false };
    if (diff === 1) return { text: `tomorrow (${date})`, overdue: false };
    if (diff < 7)  return { text: `in ${diff}d (${date})`, overdue: false };
    return { text: date, overdue: false };
  }

  function ageLabel(createdAt) {
    const today = new Date(TODAY + 'T00:00:00');
    const c = new Date(createdAt);
    const cDateOnly = new Date(c.getFullYear(), c.getMonth(), c.getDate());
    const diff = Math.round((today - cDateOnly) / 86400000);
    if (diff <= 0) return null;
    if (diff === 1) return "captured yesterday";
    return `captured ${diff}d ago`;
  }

  function tagPill(tag) {
    const cls = TAG_CLASSES[String(tag).toLowerCase()] || 'tag-default';
    return `<span class="tag ${cls}">${escapeHtml(tag)}</span>`;
  }

  function sourcePill(source) {
    const s = SOURCES[source] || SOURCES.manual;
    return `<span class="source source-${escapeHtml(source)}"><span class="source-icon">${s.icon}</span>${escapeHtml(s.label)}</span>`;
  }

  function routePill(label) {
    const lcLabel = String(label).toLowerCase();
    const KNOWN = ['tasks', 'shopping', 'calories', 'spend', 'tobacco', 'note', 'reminder', 'entry', 'multi'];
    const cls = KNOWN.includes(lcLabel) ? `route-${lcLabel}` : 'route-metric';
    return `<span class="route ${cls}">${escapeHtml(lcLabel)}</span>`;
  }

  function sortItems(items, isTask) {
    const today = TODAY;
    function bucket(t) {
      if (t.done) return 4;
      if (isTask && t.deadline) {
        if (t.deadline <= today) return 1;
        return 2;
      }
      const created = (t.created_at || '').slice(0, 10);
      if (created === today) return 3;
      return 5;
    }
    return [...items].sort((a, b) => {
      const ba = bucket(a), bb = bucket(b);
      if (ba !== bb) return ba - bb;
      if (ba === 1 || ba === 2) return (a.deadline || '').localeCompare(b.deadline || '');
      if (ba === 4) return (b.done_at || '').localeCompare(a.done_at || '');
      return (b.created_at || '').localeCompare(a.created_at || '');
    });
  }

  // ============================================
  // RENDER
  // ============================================
  function renderTasks() {
    const list = document.getElementById('tasksList');
    const items = sortItems(TASKS, true);
    const open = TASKS.filter(t => !t.done).length;
    document.getElementById('tasksCount').textContent = open === 0 ? 'all done' : `${open} open`;

    if (items.length === 0) {
      list.innerHTML = '<div class="empty">nothing for today</div>';
      return;
    }
    list.innerHTML = items.map(t => {
      const meta = [];
      const dl = fmtDeadline(t.deadline);
      if (dl) {
        meta.push(`<span class="deadline${dl.overdue ? ' overdue' : ''}">${escapeHtml(dl.text)}</span>`);
      } else if (!t.done) {
        const age = ageLabel(t.created_at);
        if (age) meta.push(`<span class="age">${age}</span>`);
      }
      (t.tags || []).forEach(tg => meta.push(tagPill(tg)));
      return `
        <div class="list-item long-pressable ${t.done ? 'done' : ''}" data-type="tasks" data-id="${t.id}">
          <div class="checkbox"></div>
          <div class="item-body">
            <div class="item-text">${escapeHtml(t.text)}</div>
            <div class="item-meta">${meta.join('')}</div>
          </div>
          ${sourcePill(t.source || 'capture')}
        </div>`;
    }).join('');
  }

  // ============================================
  // TOAST
  // ============================================
  function showToast(msg, opts = {}) {
    const t = document.getElementById('toast');
    t.className = 'toast';
    if (opts.error)  t.classList.add('error');
    if (opts.action) t.classList.add('action');

    if (opts.action) {
      t.innerHTML = `
        <span class="toast-msg">${escapeHtml(msg)}</span>
        <button class="toast-action">${escapeHtml(opts.actionLabel || 'undo')}</button>
        <div class="toast-progress"></div>
      `;
      t.querySelector('.toast-action').addEventListener('click', () => {
        if (opts.onAction) opts.onAction();
        hideToast();
      });
      const prog = t.querySelector('.toast-progress');
      requestAnimationFrame(() => {
        prog.style.transition = `transform ${opts.duration || UNDO_TIMEOUT_MS}ms linear`;
        prog.style.transform = 'scaleX(0)';
      });
    } else {
      t.textContent = msg;
    }

    t.classList.add('show');
    if (window._toastTimer) clearTimeout(window._toastTimer);
    window._toastTimer = setTimeout(() => {
      hideToast();
      if (opts.onTimeout) opts.onTimeout();
    }, opts.duration || 2400);
  }

  function hideToast() {
    const t = document.getElementById('toast');
    t.classList.remove('show');
    if (window._toastTimer) { clearTimeout(window._toastTimer); window._toastTimer = null; }
  }

  // ============================================
  // PENDING DELETE — one at a time
  // ============================================
  let PENDING_DELETE = null;

  function commitPendingDelete() {
    if (!PENDING_DELETE) return;
    const p = PENDING_DELETE;
    PENDING_DELETE = null;
    if (p.timer) clearTimeout(p.timer);
    if (p.committed) return;
    p.committed = true;
    const spec = DELETABLES[p.type];
    const tbl = spec.table || p.type;
    sbDelete(`${tbl}?id=eq.${p.row.id}`).catch(err => {
      console.error('Delete failed, refetching:', err);
      showToast(`✕ delete failed: ${err.message}`, { error: true });
      loadAll();
    });
  }

  function startDelete(type, id) {
    if (PENDING_DELETE) commitPendingDelete();

    const spec = DELETABLES[type];
    if (!spec) { console.warn('unknown deletable type:', type); return; }
    const arr = spec.array();
    const idx = arr.findIndex(r => r.id === id);
    if (idx === -1) return;
    const row = arr[idx];

    arr.splice(idx, 1);
    if (spec.afterRemove) spec.afterRemove(row);
    spec.render();

    PENDING_DELETE = {
      type, row, originalIndex: idx, committed: false,
      timer: setTimeout(() => commitPendingDelete(), UNDO_TIMEOUT_MS),
    };

    const rawLabel = spec.label(row);
    const truncated = rawLabel.length > 32 ? rawLabel.slice(0, 32) + '…' : rawLabel;
    showToast(`deleted "${truncated}"`, {
      action: true,
      actionLabel: 'UNDO',
      duration: UNDO_TIMEOUT_MS,
      onAction: () => {
        const p = PENDING_DELETE;
        if (!p || p.committed) return;
        clearTimeout(p.timer);
        const s = DELETABLES[p.type];
        const a = s.array();
        a.splice(Math.min(p.originalIndex, a.length), 0, p.row);
        if (s.afterRestore) s.afterRestore(p.row);
        PENDING_DELETE = null;
        s.render();
      },
    });
  }

  // ============================================
  // INTERACTIONS — click (toggle done) + long-press (delete)
  // ============================================
  let pressState = null;
  let ARMED = null;
  const MOVE_THRESHOLD = 10;

  function getEventPos(e) {
    if (e.touches && e.touches[0]) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
    return { x: e.clientX, y: e.clientY };
  }

  function startPress(e, item) {
    if (PENDING_DELETE) return;
    const id = +item.dataset.id;
    const type = item.dataset.type;
    const pos = getEventPos(e);
    pressState = {
      item, type, id, fired: false,
      startX: pos.x, startY: pos.y,
      timer: setTimeout(() => {
        if (!pressState) return;
        pressState.fired = true;
        if (navigator.vibrate) navigator.vibrate(30);
        armRow(item, type, id);
        if (pressState.item) pressState.item.classList.remove('pressing');
      }, LONG_PRESS_MS),
    };
    item.classList.add('pressing');
  }

  function cancelPress() {
    if (!pressState) return;
    clearTimeout(pressState.timer);
    if (pressState.item) pressState.item.classList.remove('pressing');
    const fired = pressState.fired;
    pressState = null;
    return fired;
  }

  function armRow(item, type, id) {
    ARMED = { type, id, item, originalHTML: item.innerHTML };
    item.classList.add('armed');
    item.innerHTML = `
      <div class="delete-confirm-bar">
        <span class="delete-confirm-text">delete this?</span>
        <button class="delete-confirm-delete">DELETE</button>
        <button class="delete-confirm-cancel">CANCEL</button>
      </div>`;
  }

  function clearArmed() {
    if (!ARMED) return;
    const { type } = ARMED;
    ARMED = null;
    const spec = DELETABLES[type];
    if (spec) spec.render();
  }

  document.addEventListener('pointerdown', e => {
    if (e.target.closest('.toast')) return;
    if (e.target.closest('.source')) return;
    if (e.target.closest('#foodToggle')) return;
    if (e.target.closest('#spendToggle')) return;
    const target = e.target.closest('.long-pressable');
    if (!target) return;
    if (target.classList.contains('armed')) return;
    if (ARMED) {
      clearArmed();
      const fresh = document.querySelector(
        `.long-pressable[data-type="${target.dataset.type}"][data-id="${target.dataset.id}"]`);
      if (!fresh) return;
      startPress(e, fresh);
    } else {
      startPress(e, target);
    }
  });

  document.addEventListener('pointermove', e => {
    if (!pressState) return;
    const pos = getEventPos(e);
    const dx = pos.x - pressState.startX;
    const dy = pos.y - pressState.startY;
    if (Math.hypot(dx, dy) > MOVE_THRESHOLD) cancelPress();
  });

  document.addEventListener('pointerup', cancelPress);
  document.addEventListener('pointercancel', cancelPress);
  document.addEventListener('pointerleave', cancelPress);

  document.addEventListener('scroll', () => { if (ARMED) clearArmed(); }, true);

  document.addEventListener('contextmenu', e => {
    if (e.target.closest('.long-pressable')) e.preventDefault();
  });

  document.addEventListener('click', async e => {
    if (e.target.closest('.toast')) return;

    if (e.target.classList.contains('delete-confirm-delete')) {
      if (ARMED) { const { type, id } = ARMED; ARMED = null; startDelete(type, id); }
      return;
    }
    if (e.target.classList.contains('delete-confirm-cancel') ||
        (ARMED && !e.target.closest('.long-pressable.armed'))) {
      clearArmed();
      return;
    }
    if (ARMED) return;

    if (e.target.closest('.source')) return;
    if (e.target.closest('#foodToggle')) return;
    if (e.target.closest('#spendToggle')) return;

    const item = e.target.closest('.list-item');
    if (!item) return;
    if (item.classList.contains('optimistic')) return;
    if (pressState === null && item.classList.contains('pressing')) return;

    const id = +item.dataset.id;
    const type = item.dataset.type;
    if (type !== 'tasks' && type !== 'shopping') return;
    const arr = type === 'tasks' ? TASKS : SHOPPING;
    const row = arr.find(r => r.id === id);
    if (!row) return;

    const newDone = !row.done;
    row.done = newDone;
    row.done_at = newDone ? new Date().toISOString() : null;
    if (type === 'tasks') renderTasks(); else renderShopping();

    try {
      await sbPatch(`${type}?id=eq.${id}`, { done: newDone, done_at: row.done_at });
    } catch (err) {
      row.done = !newDone;
      row.done_at = null;
      if (type === 'tasks') renderTasks(); else renderShopping();
      showToast(`✕ couldn't save: ${err.message}`, { error: true });
    }
  });

  // CAPTURE
  const captureBox = document.getElementById('capture');
  const captureInput = document.getElementById('captureInput');
  const captureBtn = document.getElementById('captureBtn');

  function autosize() {
    captureInput.style.height = 'auto';
    captureInput.style.height = Math.min(captureInput.scrollHeight, 200) + 'px';
  }
  captureInput.addEventListener('input', () => {
    autosize();
    const has = captureInput.value.trim().length > 0;
    captureBtn.disabled = !has;
    captureBox.classList.toggle('has-text', has);
  });
  captureInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  captureBtn.addEventListener('click', send);

  async function send() {
    const text = captureInput.value.trim();
    if (!text) return;

    if (PENDING_DELETE) commitPendingDelete();

    captureBtn.disabled = true;
    captureBtn.textContent = "…";

    try {
      const res = await fetch(CAPTURE_FN_URL, {
        method: "POST",
        headers: { ...HEADERS },
        body: JSON.stringify({ text }),
      });
      const data = await res.json();
      if (!res.ok || !data.ok) {
        showToast(`✕ ${data.error || "capture failed"}`, { error: true });
        console.error(data);
        return;
      }
      captureInput.value = "";
      autosize();
      captureBox.classList.remove('has-text');
      showToast(data.summary || "✓ logged");
      loadAll();
    } catch (e) {
      showToast(`✕ network: ${e.message}`, { error: true });
    } finally {
      captureBtn.disabled = false;
      captureBtn.textContent = "send";
    }
  }

  window.addEventListener('beforeunload', () => {
    if (PENDING_DELETE && !PENDING_DELETE.committed) {
      try {
        const spec = DELETABLES[PENDING_DELETE.type];
        const tbl = spec.table || PENDING_DELETE.type;
        fetch(`${REST}/${tbl}?id=eq.${PENDING_DELETE.row.id}`, {
          method: 'DELETE',
          headers: HEADERS,
          keepalive: true,
        });
      } catch (e) { /* ignore */ }
    }
  });

  loadAll();
</script>

</body>
</html>
